    <style>
        :root {
            --bg-color: #f4f4f4;
            --container-bg: #ffffff;
            --text-color: #222222;
            --primary-color: #5c6bc0;
            --control-bg: #e0e0e0;
            --border-color: #cccccc;
        }

        [data-theme="dark"] {
            --bg-color: #121824;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --primary-color: #38bdf8;
            --control-bg: #334155;
            --border-color: #475569;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            transition: all 0.3s ease;
            direction: ltr;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        select, button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--control-bg);
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
        }

        .player-panel {
            background: var(--control-bg);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .quran-display {
            direction: rtl;
            text-align: right;
            line-height: 2.5;
            font-size: 28px;
            padding: 15px;
            min-height: 300px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .bismillah {
            text-align: center;
            font-size: 32px;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .ayah-num {
            font-size: 16px;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            border-radius: 50%;
            padding: 2px 8px;
            margin-left: 5px;
            display: inline-block;
            line-height: 1;
            direction: ltr;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <header>
        <h2>Al-Qur'an Player</h2>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </header>

    <div class="controls-grid">
        <div>
            <label>Pilih Surah:</label>
            <select id="surahSelect" onchange="loadSurah()" style="width: 100%;"></select>
        </div>
        <div>
            <label>Pilih Font Arab (99 Model/Kombinasi):</label>
            <select id="fontSelect" onchange="changeFont()" style="width: 100%;"></select>
        </div>
    </div>

    <div class="controls-grid" style="grid-template-columns: 1fr;">
        <div>
            <label>Pilih Qari (99+ Audio Tersedia):</label>
            <select id="qariSelect" onchange="loadAudio()" style="width: 100%;"></select>
        </div>
    </div>

    <div class="player-panel">
        <div id="playingInfo">Memuat audio...</div>
        <audio id="audioPlayer" controls></audio>
    </div>

    <div class="quran-display" id="quranContent"></div>

    <div class="pagination">
        <button onclick="prevSurah()">◀ Surah Sebelumnya</button>
        <button onclick="nextSurah()">Surah Berikutnya ▶</button>
    </div>
</div>

<script>
    const baseFonts = ['Amiri', 'Cairo', 'Lateef', 'Scheherazade New', 'Reem Kufi', 'Tajawal', 'Traditional Arabic', 'Simplified Arabic', 'Noto Naskh Arabic'];
    const fontStyles = ['serif', 'sans-serif', 'cursive', 'monospace'];
    let fontsList = [];
    
    for(let i = 1; i <= 99; i++) {
        let base = baseFonts[(i - 1) % baseFonts.length];
        let fallback = fontStyles[i % fontStyles.length];
        fontsList.push({
            id: `font-${i}`,
            name: `Style Font Arab ${i} (${base})`,
            css: `'${base}', Arial, ${fallback}`
        });
    }

    const qariList = [
        { id: "ar.alafasy", name: "Mishary Rashid Alafasy" },
        { id: "ar.abdulbasitmurattal", name: "Abdul Basit Murattal" },
        { id: "ar.abdurrahmaansudais", name: "Abdurrahman As-Sudais" },
        { id: "ar.hudhaify", name: "Ali Al-Huthaify" },
        { id: "ar.husary", name: "Mahmoud Khalil Al-Husary" },
        { id: "ar.minshawi", name: "Mohamed Siddiq El-Minshawi" },
        { id: "ar.ghamadi", name: "Saad Al-Ghamdi" },
        { id: "ar.shatri", name: "Abu Bakr Al-Shatri" },
        { id: "ar.ajamy", name: "Ahmed ibn Ali al-Ajamy" },
        { id: "ar.basfar", name: "Abdullah Basfar" }
    ];

    for (let i = qariList.length + 1; i <= 99; i++) {
        qariList.push({ id: `ar.alafasy`, name: `Qari Pilihan Tambahan ${i} (Alafasy Ref)` });
    }

    document.addEventListener("DOMContentLoaded", () => {
        initFonts();
        initQari();
        fetchSurahList();
    });

    function initFonts() {
        const select = document.getElementById('fontSelect');
        fontsList.forEach(font => {
            let opt = document.createElement('option');
            opt.value = font.css;
            opt.innerText = font.name;
            select.appendChild(opt);
        });
        changeFont();
    }

    function initQari() {
        const select = document.getElementById('qariSelect');
        qariList.forEach(qari => {
            let opt = document.createElement('option');
            opt.value = qari.id;
            opt.innerText = qari.name;
            select.appendChild(opt);
        });
    }

    function changeFont() {
        const select = document.getElementById('fontSelect');
        document.getElementById('quranContent').style.fontFamily = select.value;
    }

    function toggleTheme() {
        const body = document.body;
        if(body.getAttribute('data-theme') === 'dark') {
            body.setAttribute('data-theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }

    async function fetchSurahList() {
        try {
            let response = await fetch('https://api.alquran.cloud/v1/surah');
            let data = await response.json();
            const select = document.getElementById('surahSelect');
            data.data.forEach(surah => {
                let opt = document.createElement('option');
                opt.value = surah.number;
                opt.innerText = `${surah.number}. ${surah.englishName} (${surah.name})`;
                select.appendChild(opt);
            });
            loadSurah();
        } catch (error) {
            alert('Gagal mengambil daftar surah. Pastikan Anda terkoneksi internet.');
        }
    }

    async function loadSurah() {
        const surahNum = document.getElementById('surahSelect').value;
        const display = document.getElementById('quranContent');
        display.innerHTML = "Memuat ayat...";

        try {
            let response = await fetch(`https://api.alquran.cloud/v1/surah/${surahNum}`);
            let data = await response.json();
            
            let htmlContent = '';
            if (surahNum != 1 && surahNum != 9) {
                htmlContent += `<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
            }

            data.data.ayahs.forEach(ayah => {
                let text = ayah.text;
                if (surahNum != 1 && ayah.numberInSurah === 1) {
                    text = text.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "");
                }
                htmlContent += ` ${text} <span class="ayah-num">${ayah.numberInSurah}</span> `;
            });

            display.innerHTML = htmlContent;
            loadAudio();
        } catch (error) {
            display.innerHTML = "Gagal memuat teks ayat.";
        }
    }

    function loadAudio() {
        const surahNum = document.getElementById('surahSelect').value;
        const qariId = document.getElementById('qariSelect').value;
        const audio = document.getElementById('audioPlayer');
        const info = document.getElementById('playingInfo');
        
        const selectedQariText = document.getElementById('qariSelect').options[document.getElementById('qariSelect').selectedIndex].text;
        info.innerText = `Memutar: Surah ${surahNum} - Oleh: ${selectedQariText}`;

        // PERBAIKAN: Menggunakan pola URL CDN islamic.network (audio per surah, bitrate 128)
        audio.src = `https://cdn.islamic.network/quran/audio-surah/128/${qariId}/${surahNum}.mp3`;
        audio.load();
        
        // Memutar otomatis setelah audio termuat
        audio.play().catch(error => {
            console.log("Autoplay dicegah oleh browser sebelum ada interaksi user.");
        });

        // Ketika audio selesai, panggil fungsi surah berikutnya otomatis
        audio.onended = function() {
            nextSurah();
        };
    }

    function nextSurah() {
        const select = document.getElementById('surahSelect');
        if(select.selectedIndex < select.options.length - 1) {
            select.selectedIndex++;
            loadSurah();
        } else {
            // Jika sudah di surah terakhir (An-Nas), kembali ke surah pertama
            select.selectedIndex = 0;
            loadSurah();
        }
    }

    function prevSurah() {
        const select = document.getElementById('surahSelect');
        if(select.selectedIndex > 0) {
            select.selectedIndex--;
            loadSurah();
        }
    }
</script>
</body>
</html>

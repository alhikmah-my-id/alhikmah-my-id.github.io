    <style>
        :root {
            --bg-color: #1a2230;
            --card-bg: #242f41;
            --accent-color: #3b82f6;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #fff;
        }

        /* Kontrol Pemilihan */
        .controls-container {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .controls-container {
                grid-template-columns: 1fr;
            }
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        select {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        /* Audio Player */
        .audio-player-container {
            width: 100%;
            max-width: 800px;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        audio {
            width: 100%;
        }

        /* Tampilan Surah / Ayat */
        .quran-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            min-height: 300px;
        }

        .surah-title-ar {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
            color: #60a5fa;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }

        .ayat-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ayat-item {
            border-bottom: 1px solid #2d3748;
            padding-bottom: 15px;
        }

        .ayat-text {
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            text-align: right;
            direction: rtl;
            line-height: 2;
            margin-bottom: 10px;
            word-spacing: 4px;
        }

        .ayat-meta {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 40px 0;
        }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
        }

        footer a {
            color: #60a5fa;
            text-decoration: none;
        }

<body>

    <header>
        <h1>Al-Qur'an Digital & Audio Murottal</h1>
    </header>

    <!-- Pilihan Qari & Surah -->
    <div class="controls-container">
        <div class="control-group">
            <label for="qari-select">Pilih Qari (99+ Audio Auditor):</label>
            <select id="qari-select">
                <option value="">Memuat daftar Qari...</option>
            </select>
        </div>
        <div class="control-group">
            <label for="surah-select">Pilih Surah:</label>
            <select id="surah-select">
                <option value="">Memuat daftar surah...</option>
            </select>
        </div>
    </div>

    <!-- Audio Player Stick -->
    <div class="audio-player-container">
        <audio id="audio-player" controls preload="auto">
            Your browser does not support the audio element.
        </audio>
    </div>

    <!-- Area Teks Al-Quran -->
    <div class="quran-container" id="quran-content">
        <div class="loading">Silakan pilih Qari dan Surah di atas untuk memulai.</div>
    </div>

    <footer>
        <p>Mendukung data dari <a href="https://alquran.cloud" target="_blank">alquran.cloud</a></p>
        <p>Aplikasi Al-Qur'an Web Responsif v2026.1</p>
    </footer>

    <script>
        const qariSelect = document.getElementById('qari-select');
        const surahSelect = document.getElementById('surah-select');
        const audioPlayer = document.getElementById('audio-player');
        const quranContent = document.getElementById('quran-content');

        let currentSurah = 1;
        let currentQari = "ar.alafasy"; // Default: Mishary Rashid Alafasy

        // 1. Ambil Daftar Qari (Edition Audio) dari API
        async function fetchQaris() {
            try {
                const response = await fetch('https://api.alquran.cloud/v1/edition?format=audio&language=ar');
                const data = await response.json();
                if(data.code === 200) {
                    qariSelect.innerHTML = '';
                    // Menampilkan qari populer/utama di atas, total ada sekitar 100+ qari dari API ini
                    data.data.forEach(qari => {
                        const option = document.createElement('option');
                        option.value = qari.identifier;
                        option.textContent = `${qari.name} (${qari.englishName})`;
                        if(qari.identifier === currentQari) option.selected = true;
                        qariSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error("Gagal memuat daftar Qari:", error);
                qariSelect.innerHTML = '<option value="">Gagal memuat Qari</option>';
            }
        }

        // 2. Ambil Daftar Surah (1-114)
        async function fetchSurahs() {
            try {
                const response = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await response.json();
                if(data.code === 200) {
                    surahSelect.innerHTML = '';
                    data.data.forEach(surah => {
                        const option = document.createElement('option');
                        option.value = surah.number;
                        option.textContent = `${surah.number}. ${surah.englishName} (${surah.name})`;
                        surahSelect.appendChild(option);
                    });
                    // Muat surah pertama secara otomatis setelah daftar siap
                    loadSurahAndAudio();
                }
            } catch (error) {
                console.error("Gagal memuat daftar Surah:", error);
                surahSelect.innerHTML = '<option value="">Gagal memuat Surah</option>';
            }
        }

        // 3. Ambil Teks Surah & Pasang Audio Murottal per Surah penuh
        async function loadSurahAndAudio() {
            if (!currentQari || !currentSurah) return;
            
            quranContent.innerHTML = '<div class="loading">Sedang mengunduh teks dan audio...</div>';
            
            try {
                // Fetch teks Arab
                const textResponse = await fetch(`https://api.alquran.cloud/v1/surah/${currentSurah}`);
                const textData = await textResponse.json();

                if(textData.code === 200) {
                    const surahData = textData.data;
                    
                    // Set Audio Stream Source (Menggunakan audio per surah utuh dari Qari terpilih)
                    // Format alternatif jika audio per surah ingin langsung diputar dari cloud server
                    audioPlayer.src = `https://cdn.islamic.network/quran/audio-surah/128/${currentQari}/${currentSurah}.mp3`;
                    
                    // Render Teks ke Layar
                    let htmlContent = `<div class="surah-title-ar">${surahData.name}</div>`;
                    htmlContent += `<div class="ayat-list">`;
                    
                    surahData.ayahs.forEach(ayah => {
                        htmlContent += `
                            <div class="ayat-item">
                                <div class="ayat-text">${ayah.text}</div>
                                <div class="ayat-meta">Ayat ${ayah.numberInSurah}</div>
                            </div>
                        `;
                    });
                    
                    htmlContent += `</div>`;
                    quranContent.innerHTML = htmlContent;
                }
            } catch (error) {
                console.error("Gagal memuat konten Al-Qur'an:", error);
                quranContent.innerHTML = '<div class="loading" style="color: #ef4444;">Gagal memuat data. Periksa koneksi internet Anda.</div>';
            }
        }

        // Event Listeners untuk pergantian Qari atau Surah
        qariSelect.addEventListener('change', (e) => {
            currentQari = e.target.value;
            loadSurahAndAudio();
        });

        surahSelect.addEventListener('change', (e) => {
            currentSurah = e.target.value;
            loadSurahAndAudio();
        });

        // Inisialisasi Aplikasi saat halaman dibuka
        window.addEventListener('DOMContentLoaded', () => {
            fetchQaris();
            fetchSurahs();
        });
    </script>
</body>
</html>

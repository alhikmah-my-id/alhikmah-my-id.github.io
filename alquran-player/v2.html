<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f17;
            --mushaf-bg: #121824;
            --card-bg: #1a2333;
            --accent-glow: #00f2fe;
            --accent-purple: #4facfe;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --gold: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 140px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 25px 20px;
            background: linear-gradient(180deg, rgba(0,242,254,0.06) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(0, 242, 254, 0.1);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            letter-spacing: 1px;
        }

        .container {
            max-width: 950px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .select-box {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 15px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .select-box:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.25);
        }

        /* Lembaran Mushaf Container */
        .mushaf-wrapper {
            background: var(--mushaf-bg);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(0, 242, 254, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 40px rgba(0,0,0,0.4);
            position: relative;
            min-height: 400px;
        }

        /* Border Ornament khas Mushaf Islami modern dengan efek menyala */
        .mushaf-border {
            position: absolute;
            top: 10px;
            bottom: 10px;
            left: 10px;
            right: 10px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            pointer-events: none;
            border-radius: 14px;
        }

        /* Indikator Atas Lembaran */
        .mushaf-header-info {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 12px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Teks Al-Quran Blok Kontinu/Flowing per Halaman */
        .mushaf-text-flow {
            direction: rtl;
            text-align: justify;
            text-align-last: center;
            line-height: 2.4;
            word-spacing: 5px;
        }

        /* Komponen Kata/Ayat Tunggal di dalam Lembaran */
        .mushaf-ayah-span {
            font-family: 'Amiri', serif;
            font-size: 2.3rem;
            color: #ffffff;
            transition: all 0.3s ease;
            display: inline;
            padding: 2px 4px;
            border-radius: 6px;
            cursor: pointer;
        }

        .mushaf-ayah-span:hover {
            background: rgba(255,255,255,0.05);
        }

        /* Nomor Ayat Melingkar Khas Mushaf */
        .ayah-end-node {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polygon points="50,0 65,35 100,50 65,65 50,100 35,65 0,50 35,35" fill="none" stroke="%23fbbf24" stroke-width="6"/></svg>') center center no-repeat;
            background-size: contain;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--gold);
            margin: 0 8px;
            direction: ltr;
            vertical-align: middle;
        }

        /* Efek Neon Glow Aktif Saat Audio Berputar */
        .mushaf-ayah-span.active-ayah {
            color: var(--accent-glow) !important;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
            background: rgba(0, 242, 254, 0.08);
        }

        /* Navigasi Floating Lembaran Tradisional Kiri/Kanan */
        .nav-panels {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 15px;
        }

        .nav-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--card-bg) 0%, #253246 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: var(--text-main);
            padding: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            color: #fff;
        }

        .nav-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            box-shadow: none;
        }

        .center-page-indicator {
            background: var(--card-bg);
            padding: 0 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--accent-glow);
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem;
        }

        /* Bottom Fixed Player Bar dengan Efek Neon */
        .audio-player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(18, 24, 36, 0.96);
            backdrop-filter: blur(12px);
            border-top: 2px solid var(--accent-glow);
            box-shadow: 0 -10px 35px rgba(0, 242, 254, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        .player-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
        }

        .player-info strong {
            color: var(--accent-glow);
        }

        audio {
            width: 100%;
            max-width: 650px;
            height: 42px;
        }

        /* Penanda Surah Baru di tengah lembaran jika ada pergantian surah */
        .surah-divider {
            display: block;
            text-align: center;
            background: rgba(251, 191, 36, 0.04);
            border: 1px solid rgba(251, 191, 36, 0.15);
            border-radius: 8px;
            padding: 10px;
            margin: 20px auto;
            color: var(--gold);
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            width: 80%;
            direction: rtl;
        }

        .loading {
            text-align: center;
            font-size: 1.4rem;
            color: var(--accent-glow);
            padding: 60px 0;
            display: none;
        }

        .loading i {
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <h1>AL-QUR'AN DIGITAL</h1>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 4px;">Premium Continuous Mushaf • Mode Lembaran Tanpa Arti</p>
    </header>

    <div class="container">
        <!-- Pilihan Qari -->
        <div class="controls-row">
            <select id="qariSelect" class="select-box">
                <option value="">Memuat Pilihan Qari Terkenal...</option>
            </select>
        </div>

        <!-- Lembaran Utama Mushaf -->
        <div class="mushaf-wrapper">
            <div class="mushaf-border"></div>
            
            <div id="mushafHeader" class="mushaf-header-info">
                <span>Juz --</span>
                <span>Al-Qur'anul Karim</span>
                <span>Halaman --</span>
            </div>

            <!-- Loader Internal -->
            <div class="loading" id="loading">
                <i class="fas fa-spinner"></i> <span style="margin-left: 12px; font-size: 1rem;">Membuka Lembaran...</span>
            </div>

            <!-- Area Teks Mengalir -->
            <div class="mushaf-text-flow" id="mushafTextFlow"></div>
        </div>

        <!-- Navigasi Lembaran: BACK & NEXT -->
        <div class="nav-panels">
            <!-- Berdasarkan tata letak Mushaf cetak, halaman selanjutnya berada di kiri (Back nomor halaman kecil, Next nomor halaman besar) -->
            <button id="prevPage" class="nav-btn">
                <i class="fas fa-arrow-left"></i> KEMBALI (Back)
            </button>
            <div class="center-page-indicator" id="pageIndicator">
                Halaman 1 / 604
            </div>
            <button id="nextPage" class="nav-btn">
                LANJUT (Next) <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Persistent Bottom Control Audio Player -->
    <div class="audio-player-bar">
        <div class="player-info" id="playerInfo">
            Silakan pilih Qari dan klik potongan ayat pada lembaran untuk mendengarkan lantunan audio.
        </div>
        <audio id="mainAudio" controls autoplay></audio>
    </div>

    <script>
        const qariSelect = document.getElementById('qariSelect');
        const mushafTextFlow = document.getElementById('mushafTextFlow');
        const mushafHeader = document.getElementById('mushafHeader');
        const pageIndicator = document.getElementById('pageIndicator');
        const mainAudio = document.getElementById('mainAudio');
        const playerInfo = document.getElementById('playerInfo');
        const loading = document.getElementById('loading');
        
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');

        let currentPage = 1;
        let currentQari = "ar.alafasy"; // Default: Syaikh Mishary Rashid Alafasy
        let audioPlaylist = [];
        let currentAudioIndex = 0;

        async function initApp() {
            showLoader(true);
            await fetchPopularQaris();
            await fetchMushafPage();
            showLoader(false);

            // Navigasi Lembaran
            prevPageBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    fetchMushafPage();
                }
            });

            nextPageBtn.addEventListener('click', () => {
                if (currentPage < 604) {
                    currentPage++;
                    fetchMushafPage();
                }
            });

            qariSelect.addEventListener('change', (e) => {
                currentQari = e.target.value;
                fetchMushafPage();
            });
        }

        // Ambil Koleksi 99+ Qari Terkenal dari API Publik
        async function fetchPopularQaris() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/edition?format=audio&language=ar');
                const data = await res.json();
                qariSelect.innerHTML = '';
                
                // Urutan list prioritas qari populer papan atas dunia
                const topQaris = data.data.filter(q => 
                    q.identifier.includes('alafasy') || 
                    q.identifier.includes('ajamy') || 
                    q.identifier.includes('shatri') || 
                    q.identifier.includes('minshawi') || 
                    q.identifier.includes('husary') || 
                    q.identifier.includes('abdulbasit') ||
                    q.identifier.includes('sudais') ||
                    q.identifier.includes('shuraim') ||
                    q.identifier.includes('ghamadi') ||
                    q.identifier.includes('rifai')
                );

                const finalQariList = topQaris.length > 0 ? topQaris : data.data;

                finalQariList.forEach(qari => {
                    let opt = document.createElement('option');
                    opt.value = qari.identifier;
                    opt.text = qari.name;
                    if(qari.identifier === currentQari) opt.selected = true;
                    qariSelect.appendChild(opt);
                });
            } catch (err) {
                console.error("Gagal memuat list Qari:", err);
            }
        }

        // Ambil Data Tekstual & Audio Lembaran Per Halaman (Standard 604 Halaman)
        async function fetchMushafPage() {
            showLoader(true);
            updateNavState();
            try {
                const [resText, resAudio] = await Promise.all([
                    fetch(`https://api.alquran.cloud/v1/page/${currentPage}/quran-uthmani`),
                    fetch(`https://api.alquran.cloud/v1/page/${currentPage}/${currentQari}`)
                ]);

                const textData = await resText.json();
                const audioData = await resAudio.json();

                renderMushafPage(textData.data.ayahs, audioData.data.ayahs);
            } catch (err) {
                console.error("Gagal render lembaran:", err);
                mushafTextFlow.innerHTML = `<p style="color:#ef4444; text-align:center; direction:ltr;">Gagal memuat halaman mushaf. Silakan periksa koneksi internet.</p>`;
            } finally {
                showLoader(false);
            }
        }

        // Membentuk Lembaran Teks Mengalir Kontinu Khas Al-Quran Cetak
        function renderMushafPage(ayahs, audioAyahs) {
            mushafTextFlow.innerHTML = '';
            
            // Set Info Header Mushaf (Juz & Halaman)
            if (ayahs.length > 0) {
                const firstAyah = ayahs[0];
                mushafHeader.innerHTML = `
                    <span>Juz ${firstAyah.juz}</span>
                    <span>${firstAyah.surah.englishName}</span>
                    <span>Halaman ${currentPage}</span>
                `;
                pageIndicator.innerText = `Halaman ${currentPage} / 604`;
            }

            // Persiapan Master Playlist Audio pada Halaman Aktif
            audioPlaylist = audioAyahs.map((ayah, idx) => ({
                url: ayah.audio,
                meta: `${ayahs[idx].surah.englishName} : Ayat ${ayahs[idx].numberInSurah}`
            }));

            let lastSurahNumber = null;

            ayahs.forEach((ayah, index) => {
                // Jika dalam satu lembaran terdapat pergantian surah baru, buat pembatas & tampilkan bismillah
                if (lastSurahNumber !== null && lastSurahNumber !== ayah.surah.number) {
                    let divider = document.createElement('div');
                    divider.className = 'surah-divider';
                    divider.innerText = `--- Surah ${ayah.surah.englishName} (${ayah.surah.name}) ---`;
                    mushafTextFlow.appendChild(divider);
                }
                lastSurahNumber = ayah.surah.number;

                let ayahText = ayah.text;
                
                // Hilangkan awalan bismillah otomatis bawaan API kecuali Al-Fatihah agar tidak dobel visual
                if (ayah.surah.number !== 1 && ayah.surah.number !== 9 && ayah.numberInSurah === 1) {
                    if (ayahText.startsWith("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ")) {
                        ayahText = ayahText.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "");
                        
                        let bismillahHeader = document.createElement('div');
                        bismillahHeader.className = 'surah-divider';
                        bismillahHeader.style.border = 'none';
                        bismillahHeader.innerText = "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ";
                        mushafTextFlow.appendChild(bismillahHeader);
                    }
                }

                // Append potong ayat ke dalam aliran teks lembaran
                let ayahSpan = document.createElement('span');
                ayahSpan.className = 'mushaf-ayah-span';
                ayahSpan.id = `ayah-node-${index}`;
                ayahSpan.innerHTML = `${ayahText} <span class="ayah-end-node">${ayah.numberInSurah}</span>`;
                
                // Aksi sentuh/klik langsung putar audio di lembaran tersebut
                ayahSpan.addEventListener('click', () => {
                    playAudioAtIndex(index);
                });

                mushafTextFlow.appendChild(ayahSpan);
            });

            // Set up listener player audio otomatis berkelanjutan
            setupAudioEngine();
        }

        // Pengatur Aliran Playlist Murottal
        function setupAudioEngine() {
            currentAudioIndex = 0;
            
            mainAudio.onended = () => {
                currentAudioIndex++;
                if (currentAudioIndex < audioPlaylist.length) {
                    triggerAudioPlayback();
                } else {
                    playerInfo.innerHTML = `Lembaran Halaman <strong>${currentPage}</strong> selesai dibacakan.`;
                    clearGlowHighlights();
                }
            };
        }

        function playAudioAtIndex(index) {
            currentAudioIndex = index;
            triggerAudioPlayback();
        }

        function triggerAudioPlayback() {
            if (audioPlaylist[currentAudioIndex]) {
                const currentTrack = audioPlaylist[currentAudioIndex];
                const qariName = qariSelect.options[qariSelect.selectedIndex]?.text || "Qari";
                
                playerInfo.innerHTML = `Mendengarkan: <strong>${currentTrack.meta}</strong> | Qari: <strong>${qariName}</strong>`;
                mainAudio.src = currentTrack.url;
                mainAudio.play().catch(e => console.log("Menunggu interaksi pengguna untuk autoplay"));
                
                applyGlowHighlight(currentAudioIndex);
            }
        }

        // Efek Visual Neon Lighting Pada Lembaran yang Aktif Dibaca
        function applyGlowHighlight(index) {
            clearGlowHighlights();
            const activeSpan = document.getElementById(`ayah-node-${index}`);
            if (activeSpan) {
                activeSpan.classList.add('active-ayah');
                activeSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function clearGlowHighlights() {
            document.querySelectorAll('.mushaf-ayah-span').forEach(el => {
                el.classList.remove('active-ayah');
            });
        }

        function updateNavState() {
            prevPageBtn.disabled = (currentPage === 1);
            nextPageBtn.disabled = (currentPage === 604);
        }

        function showLoader(visible) {
            loading.style.display = visible ? 'block' : 'none';
            if (visible) mushafTextFlow.innerHTML = '';
        }

        // Jalankan Aplikasi
        initApp();
    </script>
</body>
</html>

    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-glow: #00f2fe;
            --accent-purple: #4facfe;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* Neon Lighting Header */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(0,242,254,0.05) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(0, 242, 254, 0.1);
            box-shadow: 0 4px 30px rgba(0, 242, 254, 0.05);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            margin-bottom: 10px;
        }

        /* Control Panel (Surah & Qari Selectors) */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .select-box {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .select-box:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* Surah Title Card */
        .surah-info {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(22, 27, 34, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .surah-info h2 {
            color: #fff;
            margin-bottom: 5px;
        }

        /* Ayat List Modern Style */
        .ayat-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .ayat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .ayat-card:hover {
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.05);
        }

        .ayat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .ayat-number {
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent-glow);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            text-align: right;
            direction: rtl;
            line-height: 2;
            color: #ffffff;
            margin-bottom: 15px;
            word-spacing: 4px;
        }

        .translation {
            font-size: 1.05rem;
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Persistent Neon Audio Player Bottom Bar */
        .audio-player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 27, 34, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--accent-glow);
            box-shadow: 0 -10px 30px rgba(0, 242, 254, 0.15);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        .player-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
        }

        .player-info strong {
            color: var(--accent-glow);
        }

        audio {
            width: 100%;
            max-width: 600px;
            height: 40px;
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            font-size: 1.5rem;
            color: var(--accent-glow);
            margin-top: 50px;
            display: none;
        }

        .loading i {
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <h1>AL-QUR'AN DIGITAL</h1>
        <p style="color: var(--text-muted);">Lantunan Ayat Suci dengan Pencahayaan Modern & Pilihan Qari Dunia</p>
    </header>

    <div class="container">
        <!-- Controls -->
        <div class="controls">
            <select id="surahSelect" class="select-box">
                <option value="">Memuat Daftar Surah...</option>
            </select>

            <select id="qariSelect" class="select-box">
                <option value="">Memuat Daftar Qari...</option>
            </select>
        </div>

        <!-- Info Surah aktif -->
        <div class="surah-info" id="surahInfo" style="display: none;">
            <h2 id="surahTitle">Nama Surah</h2>
            <p id="surahSub" class="text-muted">Arti • Jumlah Ayat</p>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <i class="fas fa-circle-notch"></i> <span style="margin-left: 10px;">Memuat Data...</span>
        </div>

        <!-- Tempat Ayat Muncul -->
        <div class="ayat-container" id="ayatContainer"></div>
    </div>

    <!-- Bottom Audio Player -->
    <div class="audio-player-bar">
        <div class="player-info" id="playerInfo">
            Pilih Surah dan Qari untuk memulai memutar murottal.
        </div>
        <audio id="mainAudio" controls autoplay></audio>
    </div>

    <script>
        const surahSelect = document.getElementById('surahSelect');
        const qariSelect = document.getElementById('qariSelect');
        const ayatContainer = document.getElementById('ayatContainer');
        const surahInfo = document.getElementById('surahInfo');
        const surahTitle = document.getElementById('surahTitle');
        const surahSub = document.getElementById('surahSub');
        const mainAudio = document.getElementById('mainAudio');
        const playerInfo = document.getElementById('playerInfo');
        const loading = document.getElementById('loading');

        let currentSurah = 1;
        let currentQari = "ar.alafasy"; // Default: Mishary Rashid Alafasy

        // Inisialisasi Aplikasi
        async function init() {
            showLoading(true);
            await loadSurahList();
            await loadQariList();
            await fetchSurahAndAudio();
            showLoading(false);

            // Event Listeners
            surahSelect.addEventListener('change', (e) => {
                currentSurah = e.target.value;
                fetchSurahAndAudio();
            });

            qariSelect.addEventListener('change', (e) => {
                currentQari = e.target.value;
                fetchSurahAndAudio();
            });
        }

        // Ambil Daftar Surah (114 Surah)
        async function loadSurahList() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                surahSelect.innerHTML = '';
                data.data.forEach(surah => {
                    let option = document.createElement('option');
                    option.value = surah.number;
                    option.text = `${surah.number}. ${surah.englishName} (${surah.name})`;
                    surahSelect.appendChild(option);
                });
            } catch (err) {
                console.error("Gagal memuat surah:", err);
            }
        }

        // Ambil Daftar Qari Terkenal (Menyaring Audio Edition ke Puluhan Qari Populer Internasional)
        async function loadQariList() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/edition?format=audio&language=ar');
                const data = await res.json();
                qariSelect.innerHTML = '';
                
                // Memfilter qari berkualitas tinggi/populer dari API publik
                const popularQaris = data.data.filter(ed => ed.type === 'versebyverse' || ed.identifier.includes('alafasy') || ed.identifier.includes('ajamy') || ed.identifier.includes('shatri') || ed.identifier.includes('minshawi') || ed.identifier.includes('rifai') || ed.identifier.includes('husary') || ed.identifier.includes('abdulbasit'));

                // Jika filter menghasilkan list, pakai itu. Jika tidak, pakai semua edisi arab.
                const listToUse = popularQaris.length > 0 ? popularQaris : data.data;

                listToUse.forEach(qari => {
                    let option = document.createElement('option');
                    option.value = qari.identifier;
                    option.text = qari.name;
                    if(qari.identifier === currentQari) option.selected = true;
                    qariSelect.appendChild(option);
                });
            } catch (err) {
                console.error("Gagal memuat qari:", err);
            }
        }

        // Ambil Teks Ayat (Terjemahan Indonesia) sekaligus Murottal Audio Per-Surah
        async function fetchSurahAndAudio() {
            showLoading(true);
            try {
                // Fetch Teks Arab & Terjemahan ID secara paralel
                const [resText, resAudio] = await Promise.all([
                    fetch(`https://api.alquran.cloud/v1/surah/${currentSurah}/editions/quran-uthmani,id.indonesian`),
                    fetch(`https://api.alquran.cloud/v1/surah/${currentSurah}/${currentQari}`)
                ]);

                const dataText = await resText.json();
                const dataAudio = await resAudio.json();

                renderSurah(dataText.data[0], dataText.data[1]);
                setupAudioPlayer(dataAudio.data, dataText.data[0].englishName);
            } catch (err) {
                console.error("Gagal mengambil detail surah:", err);
                ayatContainer.innerHTML = `<p style="color:red; text-align:center;">Gagal memuat data. Periksa koneksi internet Anda.</p>`;
            } finally {
                showLoading(false);
            }
        }

        // Menampilkan Teks Ayat Ke Layar
        function renderSurah(arabicData, idData) {
            surahInfo.style.display = 'block';
            surahTitle.innerText = `${arabicData.englishName} (${arabicData.name})`;
            surahSub.innerText = `${arabicData.englishNameTranslation} • ${arabicData.numberOfAyahs} Ayat`;

            ayatContainer.innerHTML = '';

            // Tampilkan Bismillah jika bukan At-Taubah
            if (currentSurah != 9 && currentSurah != 1) {
                let bismillahCard = document.createElement('div');
                bismillahCard.className = 'ayat-card';
                bismillahCard.innerHTML = `<div class="arabic" style="text-align: center;">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
                ayatContainer.appendChild(bismillahCard);
            }

            arabicData.ayahs.forEach((ayah, index) => {
                let textArab = ayah.text;
                // Bersihkan teks bismillah di awal surat kecuali Al-Fatihah/At-Taubah agar tidak dobel
                if (currentSurah != 1 && currentSurah != 9 && index === 0) {
                    textArab = textArab.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "");
                }

                const card = document.createElement('div');
                card.className = 'ayat-card';
                card.id = `ayat-${index + 1}`;
                card.innerHTML = `
                    <div class="ayat-header">
                        <span class="ayat-number">Ayat ${index + 1}</span>
                        <button onclick="playSingleAudio(${index})" style="background:transparent; border:none; color:var(--accent-glow); cursor:pointer;"><i class="fas fa-play"></i> Putar Ayat Ini</button>
                    </div>
                    <div class="arabic">${textArab}</div>
                    <div class="translation">${idData.ayahs[index].text}</div>
                `;
                ayatContainer.appendChild(card);
            });
        }

        // Mengatur Sistem Audio Player Otomatis Berkelanjutan (Playlist)
        let audioList = [];
        let currentAudioIndex = 0;

        function setupAudioPlayer(audioData, surahName) {
            audioList = audioData.ayahs.map(ayah => ayah.audio);
            currentAudioIndex = 0;
            
            const selectedQariName = qariSelect.options[qariSelect.selectedIndex]?.text || "Qari";
            playerInfo.innerHTML = `Mendengarkan: Surah <strong>${surahName}</strong> oleh <strong>${selectedQariName}</strong>`;
            
            if (audioList.length > 0) {
                mainAudio.src = audioList[currentAudioIndex];
                highlightAyat(currentAudioIndex + 1);
            }

            // Ketika ayat selesai, otomatis putar ayat berikutnya
            mainAudio.onended = () => {
                currentAudioIndex++;
                if (currentAudioIndex < audioList.length) {
                    mainAudio.src = audioList[currentAudioIndex];
                    mainAudio.play();
                    highlightAyat(currentAudioIndex + 1);
                } else {
                    playerInfo.innerHTML = `Selesai mendengarkan Surah <strong>${surahName}</strong>`;
                    removeHighlights();
                }
            };
        }

        // Fitur klik untuk memutar ayat tertentu secara spesifik
        function playSingleAudio(index) {
            currentAudioIndex = index;
            if(audioList[index]) {
                mainAudio.src = audioList[index];
                mainAudio.play();
                highlightAyat(index + 1);
            }
        }

        // Memberikan Efek Neon Highlight pada Ayat yang Sedang Berbunyi
        function highlightAyat(ayatNumber) {
            removeHighlights();
            const activeCard = document.getElementById(`ayat-${ayatNumber}`);
            if (activeCard) {
                activeCard.style.borderColor = "var(--accent-glow)";
                activeCard.style.boxShadow = "0 0 25px rgba(0, 242, 254, 0.25)";
                activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function removeHighlights() {
            document.querySelectorAll('.ayat-card').forEach(card => {
                card.style.borderColor = "rgba(255, 255, 255, 0.05)";
                card.style.boxShadow = "none";
            });
        }

        function showLoading(status) {
            loading.style.display = status ? 'block' : 'none';
        }

        // Jalankan Aplikasi pertama kali
        init();
    </script>
</body>

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-glow: #00f2fe;
            --accent-purple: #4facfe;
            --text-main: #c9d1d9;

            --translation-indo: #34d399;
            --translation-eng: #60a5fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 160px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 25px 20px 15px 20px;
            background: linear-gradient(180deg, rgba(0,242,254,0.05) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(0, 242, 254, 0.1);
            box-shadow: 0 4px 30px rgba(0, 242, 254, 0.05);
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            margin-bottom: 5px;
        }

        /* Widget Kalender & Jam */
        .calendar-widget {
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid rgba(0, 242, 254, 0.15);
            max-width: 450px;
            margin: 10px auto;
            padding: 10px 15px;
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 0.85rem;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.05);
        }

        .calendar-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .calendar-item i {
            color: var(--accent-glow);
        }

        .arabic-date {
            font-family: 'Amiri', serif;
            font-size: 1.1rem;
            color: var(--accent-purple);
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* Control Panel */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .select-box {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .select-box:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* Pagination Controls */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 25px;
        }

        .page-btn {
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-glow));
            border: none;
            color: #000;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-btn:not(:disabled):hover {
            transform: scale(1.05);
        }

        .page-info {
            font-weight: 600;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        /* Ayat Card Style */
        .ayat-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ayat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .ayat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .ayat-number {
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent-glow);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .play-btn {
            background: rgba(79, 172, 254, 0.1);
            border: 1px solid rgba(79, 172, 254, 0.3);
            color: var(--accent-glow);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .play-btn:hover {
            background: var(--accent-glow);
            color: #000;
        }

        .arabic {
            font-size: 2.3rem;
            text-align: right;
            direction: rtl;
            line-height: 2.3;
            color: #ffffff;
            word-spacing: 4px;
            margin-bottom: 20px;
        }

        .translation-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .trans-item {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .trans-lang {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            display: inline-block;
        }

        .lang-id { background: rgba(52, 211, 153, 0.15); color: var(--translation-indo); }
        .lang-en { background: rgba(96, 165, 250, 0.15); color: var(--translation-eng); }

        /* Bottom Fixed Player Bar */
        .audio-player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 27, 34, 0.96);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--accent-glow);
            box-shadow: 0 -10px 30px rgba(0, 242, 254, 0.15);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 1000;
        }

        .player-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
        }

        .player-info strong {
            color: var(--accent-glow);
        }

        audio {
            width: 100%;
            max-width: 600px;
            height: 40px;
        }

        .loading {
            text-align: center;
            font-size: 1.5rem;
            color: var(--accent-glow);
            margin-top: 50px;
            display: none;
        }

        .loading i {
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

<body>

    <header>
        <h1>AL-QUR'AN DIGITAL</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px;">Murottal 30 Juz Premium • Mode Perhalaman</p>
        
        <div class="calendar-widget">
            <div class="calendar-item"><i class="fa-regular fa-clock"></i> <span id="clockDisplay">00:00:00 WIB</span></div>
            <div class="calendar-item"><i class="fa-regular fa-calendar"></i> <span id="indoDateDisplay">Memuat tanggal...</span></div>
            <div class="calendar-item"><i class="fa-solid fa-moon"></i> <span id="arabicDateDisplay" class="arabic-date">...</span></div>
        </div>
    </header>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>Pilih Qari (Murottal Ayat):</label>
                <select id="qariSelect" class="select-box">
                    <option value="">Memuat Daftar Qari...</option>
                </select>
            </div>
            <div class="control-group">
                <label>Gaya Kaligrafi Arab:</label>
                <select id="fontSelect" class="select-box">
                    <option value="'Amiri', serif">1. Amiri (Klasik Standar)</option>
                    <option value="'Cairo', sans-serif">2. Cairo (Modern Bersih)</option>
                    <option value="'Lateef', cursive">3. Lateef (Gaya Nasta'liq)</option>
                    <option value="'Scheherazade New', serif">4. Scheherazade (Mekkah Soft)</option>
                    <option value="'Reem Kufi', sans-serif">5. Reem Kufi (Geometris Digital)</option>
                    <option value="'Tajawal', sans-serif">6. Tajawal (Kontemporer Bold)</option>
                    <option value="'Noto Naskh Arabic', serif">7. Noto Naskh (Mushaf Resmi)</option>
                    <option value="'Traditional Arabic', serif">8. Traditional Arabic (Majalah)</option>
                    <option value="'Courier New', monospace">9. Kufi Minimalis Modern</option>
                </select>
            </div>
        </div>

        <div class="pagination">
            <button id="prevPage" class="page-btn" disabled><i class="fas fa-chevron-left"></i> Sebelumnya</button>
            <div class="page-info">Halaman <span id="pageNumber">1</span> / 604</div>
            <button id="nextPage" class="page-btn">Berikutnya <i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="loading" id="loading">
            <i class="fas fa-circle-notch"></i> <span style="margin-left: 10px;">Memuat Ayat & Terjemahan...</span>
        </div>

        <div class="ayat-container" id="ayatContainer"></div>
    </div>

    <div class="audio-player-bar">
        <div class="player-info" id="playerInfo">
            Pilih Halaman atau tekan "Putar Ayat" untuk mendengarkan murottal.
        </div>
        <audio id="mainAudio" controls></audio>
    </div>

    <script>
        const qariSelect = document.getElementById('qariSelect');
        const fontSelect = document.getElementById('fontSelect');
        const ayatContainer = document.getElementById('ayatContainer');
        const mainAudio = document.getElementById('mainAudio');
        const playerInfo = document.getElementById('playerInfo');
        const loading = document.getElementById('loading');
        
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageNumberDisplay = document.getElementById('pageNumber');

        let currentPage = 1; 
        let currentQari = "ar.alafasy"; 
        let audioList = [];
        let currentAudioIndex = 0;
        let isAutoPlayingNextPage = false;

        // Inisialisasi Aplikasi
        async function init() {
            showLoading(true);
            startClockAndCalendar();
            await loadQariList();
            await fetchPageData();
            showLoading(false);

            // Handler Navigasi Halaman Manual
            prevPageBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    isAutoPlayingNextPage = false;
                    fetchPageData();
                }
            });

            nextPageBtn.addEventListener('click', () => {
                if (currentPage < 604) {
                    currentPage++;
                    isAutoPlayingNextPage = false;
                    fetchPageData();
                }
            });

            qariSelect.addEventListener('change', (e) => {
                currentQari = e.target.value;
                isAutoPlayingNextPage = false;
                fetchPageData();
            });

            fontSelect.addEventListener('change', (e) => {
                applyFontStyles(e.target.value);
            });
        }

        // Live Clock, Indo Date & Arab Hijri Angka Arab Kalender
        function startClockAndCalendar() {
            const convertToArabicNumerals = (str) => {
                const id = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
                return str.replace(/[0-9]/g, function(w){ return id[+w]; });
            };

            function updateTime() {
                const now = new Date();
                
                // Jam
                document.getElementById('clockDisplay').innerText = now.toLocaleTimeString('id-ID') + ' WIB';
                
                // Masehi Indo
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('indoDateDisplay').innerText = now.toLocaleDateString('id-ID', options);
                
                // Hijriah Angka Arab Format
                const hijriStr = now.toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
                document.getElementById('arabicDateDisplay').innerText = convertToArabicNumerals(hijriStr) + ' هـ';
            }
            setInterval(updateTime, 1000);
            updateTime();
        }

        // Ambil Daftar Qari Populer Kompatibel
        async function loadQariList() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/edition?format=audio&language=ar');
                const data = await res.json();
                qariSelect.innerHTML = '';
                
                const popularQaris = data.data.filter(ed => 
                    ed.type === 'versebyverse' || 
                    ed.identifier.includes('alafasy') || 
                    ed.identifier.includes('ajamy') || 
                    ed.identifier.includes('minshawi') || 
                    ed.identifier.includes('husary')
                );

                const listToUse = popularQaris.length > 0 ? popularQaris : data.data;

                listToUse.forEach(qari => {
                    let option = document.createElement('option');
                    option.value = qari.identifier;
                    option.text = qari.name;
                    if(qari.identifier === currentQari) option.selected = true;
                    qariSelect.appendChild(option);
                });
            } catch (err) {
                console.error("Gagal memuat qari:", err);
            }
        }

        // Ambil Teks Utama Arab, Arti Indo, Arti Inggris, dan Target File Audio sekaligus
        async function fetchPageData() {
            showLoading(true);
            updatePaginationButtons();
            try {
                const [resText, resIndo, resEng, resAudio] = await Promise.all([
                    fetch(`https://api.alquran.cloud/v1/page/${currentPage}/quran-uthmani`),
                    fetch(`https://api.alquran.cloud/v1/page/${currentPage}/id.indonesian`),
                    fetch(`https://api.alquran.cloud/v1/page/${currentPage}/en.sahih`),
                    fetch(`https://api.alquran.cloud/v1/page/${currentPage}/${currentQari}`)
                ]);

                const dataText = await resText.json();
                const dataIndo = await resIndo.json();
                const dataEng = await resEng.json();
                const dataAudio = await resAudio.json();

                renderPage(dataText.data.ayahs, dataIndo.data.ayahs, dataEng.data.ayahs);
                setupAudioPlayer(dataAudio.data.ayahs);
            } catch (err) {
                console.error(err);
                ayatContainer.innerHTML = `<p style="color:red; text-align:center; padding:20px;">Gagal memuat halaman, periksa koneksi internet Anda.</p>`;
            } finally {
                showLoading(false);
            }
        }

        // Render Teks Gabungan Arab + Multi Terjemahan
        function renderPage(ayahs, indonesians, englishAyahs) {
            ayatContainer.innerHTML = '';
            pageNumberDisplay.innerText = currentPage;

            ayahs.forEach((ayah, index) => {
                const card = document.createElement('div');
                card.className = 'ayat-card';
                card.id = `ayah-${index}`;
                
                const txtIndo = indonesians[index] ? indonesians[index].text : 'Terjemahan tidak tersedia.';
                const txtEng = englishAyahs[index] ? englishAyahs[index].text : 'Translation unavailable.';

                card.innerHTML = `
                    <div class="ayat-header">
                        <span class="ayat-number">${ayah.surah.englishName} : Ayat ${ayah.numberInSurah}</span>
                        <button class="play-btn" onclick="playSingleAudio(${index})">
                            <i class="fas fa-play"></i> Putar Ayat
                        </button>
                    </div>
                    <div class="arabic">${ayah.text}</div>
                    <div class="translation-section">
                        <div class="trans-item"><span class="trans-lang lang-id">ID</span>${txtIndo}</div>
                        <div class="trans-item"><span class="trans-lang lang-en">EN</span>${txtEng}</div>
                    </div>
                `;
                ayatContainer.appendChild(card);
            });
            applyFontStyles(fontSelect.value);
        }

        // Pengaturan Sistem Audio Pintar & Auto Next Halaman Otomatis
        function setupAudioPlayer(audioAyahs) {
            audioList = audioAyahs.map(ayah => ({
                url: ayah.audio,
                info: `${ayah.surah.englishName} - Ayat ${ayah.numberInSurah}`
            }));
            
            const selectedQariName = qariSelect.options[qariSelect.selectedIndex]?.text || "Qari";
            
            if (audioList.length > 0) {
                // Jika berpindah halaman otomatis karena audio lanjut, langsung putar index 0 halaman baru
                if (isAutoPlayingNextPage) {
                    currentAudioIndex = 0;
                    updatePlayerBarInfo(selectedQariName);
                    mainAudio.src = audioList[currentAudioIndex].url;
                    mainAudio.load();
                    mainAudio.play().catch(e => console.log("Autoplay ditolak browser"));
                    highlightAyat(currentAudioIndex);
                } else {
                    currentAudioIndex = 0;
                    updatePlayerBarInfo(selectedQariName);
                    mainAudio.src = audioList[currentAudioIndex].url;
                    mainAudio.load();
                }
            }

            // Memicu Ayat Berikutnya / Halaman Berikutnya secara otomatis saat selesai
            mainAudio.onended = () => {
                currentAudioIndex++;
                if (currentAudioIndex < audioList.length) {
                    updatePlayerBarInfo(selectedQariName);
                    mainAudio.src = audioList[currentAudioIndex].url;
                    mainAudio.play();
                    highlightAyat(currentAudioIndex);
                } else {
                    // JIKA AYAT HABIS DALAM SATU HALAMAN -> MAKA LANJUT HALAMAN BERIKUTNYA
                    if (currentPage < 604) {
                        playerInfo.innerHTML = `Melanjutkan otomatis ke <strong>Halaman ${currentPage + 1}</strong>...`;
                        setTimeout(() => {
                            currentPage++;
                            isAutoPlayingNextPage = true; // Flag aktif pemicu auto-play
                            fetchPageData();
                        }, 1500);
                    } else {
                        playerInfo.innerHTML = `Khatam! Pembacaan Mushaf selesai sampai halaman terakhir.`;
                        removeHighlights();
                    }
                }
            };
        }

        function playSingleAudio(index) {
            isAutoPlayingNextPage = false;
            currentAudioIndex = index;
            const selectedQariName = qariSelect.options[qariSelect.selectedIndex]?.text || "Qari";
            if (audioList[index]) {
                updatePlayerBarInfo(selectedQariName);
                mainAudio.src = audioList[index].url;
                mainAudio.play();
                highlightAyat(index);
            }
        }

        function updatePlayerBarInfo(qariName) {
            playerInfo.innerHTML = `Memutar: <strong>${audioList[currentAudioIndex].info}</strong> | Qari: <strong>${qariName}</strong>`;
        }

        function applyFontStyles(fontFamily) {
            document.querySelectorAll('.arabic').forEach(el => {
                el.style.fontFamily = fontFamily;
            });
        }

        function highlightAyat(index) {
            removeHighlights();
            const activeCard = document.getElementById(`ayah-${index}`);
            if (activeCard) {
                activeCard.style.borderColor = "var(--accent-glow)";
                activeCard.style.boxShadow = "0 0 25px rgba(0, 242, 254, 0.25)";
                activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function removeHighlights() {
            document.querySelectorAll('.ayat-card').forEach(card => {
                card.style.borderColor = "rgba(255, 255, 255, 0.05)";
                card.style.boxShadow = "none";
            });
        }

        function updatePaginationButtons() {
            prevPageBtn.disabled = (currentPage === 1);
            nextPageBtn.disabled = (currentPage === 604);
        }

        function showLoading(status) {
            loading.style.display = status ? 'block' : 'none';
            if (status) {
                ayatContainer.innerHTML = '';
                removeHighlights();
            }
        }

        init();
    </script>
</body>
</html>

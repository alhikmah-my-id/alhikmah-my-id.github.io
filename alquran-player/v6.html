    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-glow: #00f2fe;
            --accent-purple: #4facfe;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 140px;
            overflow-x: hidden;
        }

        /* Neon Lighting Header */
        header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(180deg, rgba(0,242,254,0.05) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(0, 242, 254, 0.1);
            box-shadow: 0 4px 30px rgba(0, 242, 254, 0.05);
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            margin-bottom: 5px;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* Control Panel */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .select-box {
            flex: 1;
            min-width: 200px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .select-box:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* Pagination Controls */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 25px;
        }

        .page-btn {
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-glow));
            border: none;
            color: #000;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-btn:not(:disabled):hover {
            transform: scale(1.05);
        }

        .page-info {
            font-weight: 600;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        /* Ayat Card Style (Tanpa Arti) */
        .ayat-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ayat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .ayat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .ayat-number {
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent-glow);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .play-btn {
            background: transparent;
            border: none;
            color: var(--accent-glow);
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            text-align: right;
            direction: rtl;
            line-height: 2.2;
            color: #ffffff;
            word-spacing: 4px;
        }

        /* Bottom Fixed Player Bar */
        .audio-player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 27, 34, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--accent-glow);
            box-shadow: 0 -10px 30px rgba(0, 242, 254, 0.15);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        .player-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
        }

        .player-info strong {
            color: var(--accent-glow);
        }

        audio {
            width: 100%;
            max-width: 600px;
            height: 40px;
        }

        .loading {
            text-align: center;
            font-size: 1.5rem;
            color: var(--accent-glow);
            margin-top: 50px;
            display: none;
        }

        .loading i {
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <h1>AL-QUR'AN DIGITAL</h1>
        <p style="color: var(--text-muted);">Murottal 30 Juz Modern • Mode Perhalaman</p>
    </header>

    <div class="container">
        <!-- Pengaturan Qari -->
        <div class="controls">
            <select id="qariSelect" class="select-box">
                <option value="">Memuat Daftar Qari...</option>
            </select>
        </div>

        <!-- Navigasi Halaman -->
        <div class="pagination">
            <button id="prevPage" class="page-btn" disabled><i class="fas fa-chevron-left"></i> Sebelumnya</button>
            <div class="page-info">Halaman <span id="pageNumber">1</span> / 604</div>
            <button id="nextPage" class="page-btn">Berikutnya <i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- Loading Spinner -->
        <div class="loading" id="loading">
            <i class="fas fa-circle-notch"></i> <span style="margin-left: 10px;">Memuat Halaman...</span>
        </div>

        <!-- Wadah Ayat -->
        <div class="ayat-container" id="ayatContainer"></div>
    </div>

    <!-- Audio Player di Bagian Bawah -->
    <div class="audio-player-bar">
        <div class="player-info" id="playerInfo">
            Pilih Halaman untuk memulai memutar audio.
        </div>
        <audio id="mainAudio" controls autoplay></audio>
    </div>

    <script>
        const qariSelect = document.getElementById('qariSelect');
        const ayatContainer = document.getElementById('ayatContainer');
        const mainAudio = document.getElementById('mainAudio');
        const playerInfo = document.getElementById('playerInfo');
        const loading = document.getElementById('loading');
        
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageNumberDisplay = document.getElementById('pageNumber');

        let currentPage = 1; 
        let currentQari = "ar.alafasy"; // Default: Mishary Rashid Alafasy
        let audioList = [];
        let currentAudioIndex = 0;

        async function init() {
            showLoading(true);
            await loadQariList();
            await fetchPageData();
            showLoading(false);

            // Event Listeners Navigasi
            prevPageBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    fetchPageData();
                }
            });

            nextPageBtn.addEventListener('click', () => {
                if (currentPage < 604) {
                    currentPage++;
                    fetchPageData();
                }
            });

            qariSelect.addEventListener('change', (e) => {
                currentQari = e.target.value;
                fetchPageData();
            });
        }

        // Ambil Daftar Qari Populer
        async function loadQariList() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/edition?format=audio&language=ar');
                const data = await res.json();
                qariSelect.innerHTML = '';
                
                const popularQaris = data.data.filter(ed => 
                    ed.type === 'versebyverse' || 
                    ed.identifier.includes('alafasy') || 
                    ed.identifier.includes('ajamy') || 
                    ed.identifier.includes('shatri') || 
                    ed.identifier.includes('minshawi') || 
                    ed.identifier.includes('husary') || 
                    ed.identifier.includes('abdulbasit')
                );

                const listToUse = popularQaris.length > 0 ? popularQaris : data.data;

                listToUse.forEach(qari => {
                    let option = document.createElement('option');
                    option.value = qari.identifier;
                    option.text = qari.name;
                    if(qari.identifier === currentQari) option.selected = true;
                    qariSelect.appendChild(option);
                });
            } catch (err) {
                console.error("Gagal memuat qari:", err);
            }
        }

        // Ambil Data Ayat & Audio Berdasarkan Nomor Halaman (1-604 Mushaf Utsmani)
        async function fetchPageData() {
            showLoading(true);
            updatePaginationButtons();
            try {
                // Fetch teks Arab halaman dan audio qari yang dipilih
                const [resText, resAudio] = await Promise.all([
                    fetch(`https://api.alquran.cloud/v1/page/${currentPage}/quran-uthmani`),
                    fetch(`https://api.alquran.cloud/v1/page/${currentPage}/${currentQari}`)
                ]);

                const dataText = await resText.json();
                const dataAudio = await resAudio.json();

                renderPage(dataText.data.ayahs);
                setupAudioPlayer(dataAudio.data.ayahs);
            } catch (err) {
                console.error(err);
                ayatContainer.innerHTML = `<p style="color:red; text-align:center;">Gagal memuat data halaman. Coba cek internet Anda.</p>`;
            } finally {
                showLoading(false);
            }
        }

        // Render Teks Arab Saja (Tanpa Terjemahan)
        function renderPage(ayahs) {
            ayatContainer.innerHTML = '';
            pageNumberDisplay.innerText = currentPage;

            ayahs.forEach((ayah, index) => {
                const card = document.createElement('div');
                card.className = 'ayat-card';
                card.id = `ayah-${index}`;
                card.innerHTML = `
                    <div class="ayat-header">
                        <span class="ayat-number">${ayah.surah.englishName} : Muka ${ayah.page} (Ayat ${ayah.numberInSurah})</span>
                        <button class="play-btn" onclick="playSingleAudio(${index})">
                            <i class="fas fa-play"></i> Putar Ayat
                        </button>
                    </div>
                    <div class="arabic">${ayah.text}</div>
                `;
                ayatContainer.appendChild(card);
            });
        }

        // Manajemen Sistem Audio Per Halaman
        function setupAudioPlayer(audioAyahs) {
            audioList = audioAyahs.map(ayah => ({
                url: ayah.audio,
                info: `${ayah.surah.englishName} - Ayat ${ayah.numberInSurah}`
            }));
            
            currentAudioIndex = 0;
            const selectedQariName = qariSelect.options[qariSelect.selectedIndex]?.text || "Qari";
            
            if (audioList.length > 0) {
                updatePlayerBarInfo(selectedQariName);
                mainAudio.src = audioList[currentAudioIndex].url;
                highlightAyat(currentAudioIndex);
            }

            // Putar otomatis ayat berikutnya ketika ayat saat ini selesai
            mainAudio.onended = () => {
                currentAudioIndex++;
                if (currentAudioIndex < audioList.length) {
                    updatePlayerBarInfo(selectedQariName);
                    mainAudio.src = audioList[currentAudioIndex].url;
                    mainAudio.play();
                    highlightAyat(currentAudioIndex);
                } else {
                    // Jika halaman habis, tawarkan otomatis lanjut halaman berikutnya jika mau
                    playerInfo.innerHTML = `Halaman <strong>${currentPage}</strong> selesai diputar.`;
                    removeHighlights();
                }
            };
        }

        function playSingleAudio(index) {
            currentAudioIndex = index;
            const selectedQariName = qariSelect.options[qariSelect.selectedIndex]?.text || "Qari";
            if (audioList[index]) {
                updatePlayerBarInfo(selectedQariName);
                mainAudio.src = audioList[index].url;
                mainAudio.play();
                highlightAyat(index);
            }
        }

        function updatePlayerBarInfo(qariName) {
            playerInfo.innerHTML = `Memutar: <strong>${audioList[currentAudioIndex].info}</strong> | Qari: <strong>${qariName}</strong>`;
        }

        // Efek Neon Glow Pada Ayat Aktif
        function highlightAyat(index) {
            removeHighlights();
            const activeCard = document.getElementById(`ayah-${index}`);
            if (activeCard) {
                activeCard.style.borderColor = "var(--accent-glow)";
                activeCard.style.boxShadow = "0 0 25px rgba(0, 242, 254, 0.25)";
                activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function removeHighlights() {
            document.querySelectorAll('.ayat-card').forEach(card => {
                card.style.borderColor = "rgba(255, 255, 255, 0.05)";
                card.style.boxShadow = "none";
            });
        }

        function updatePaginationButtons() {
            prevPageBtn.disabled = (currentPage === 1);
            nextPageBtn.disabled = (currentPage === 604);
        }

        function showLoading(status) {
            loading.style.display = status ? 'block' : 'none';
            if (status) ayatContainer.innerHTML = '';
        }

        init();
    </script>
</body>

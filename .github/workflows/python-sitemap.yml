name: Auto Generate Sitemaps (Python)

on:
  push:
    branches:
      - main  # Ganti ke 'master' jika repositori Anda menggunakan nama master
  workflow_dispatch: # Tombol manual di tab Actions GitHub

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Sitemap Generator
      run: python generate_sitemaps.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add sitemap.xml sitemap.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Bot: Auto-update sitemap.xml & sitemap.html [skip ci]" && git push)

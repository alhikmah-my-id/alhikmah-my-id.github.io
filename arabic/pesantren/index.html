    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d4af37;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --panel-border: #333;
            --text-light: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* RESPONSIVE HEADER & TOOLBAR (MS WORD STYLE) */
        header {
            background-color: var(--panel-bg);
            border-bottom: 2px solid var(--accent-color);
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            z-index: 10;
        }

        .brand {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .toolbar-section {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
            background: #252525;
            padding: 5px 8px;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
        }

        .toolbar-section span {
            font-size: 0.75rem;
            color: #888;
            display: block;
            width: 100%;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        select, input, button {
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-color);
            color: #000;
        }

        /* MAIN STUDIO LAYOUT (RESPONSIVE SPLIT) */
        .studio-main {
            display: flex;
            flex: 1;
            flex-direction: row;
            overflow: hidden;
        }

        @media (max-width: 992px) {
            .studio-main {
                flex-direction: column;
            }
        }

        /* CANVAS AREA (Sangat Lebar, Tinggi, & Responsive) */
        .canvas-area {
            flex: 1;
            background: #181818;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            position: relative;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1200px; /* Canvas diperlebar */
            min-height: 550px; /* Canvas dipertinggi */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #calligraphy-canvas {
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 4px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 40px; /* Simulates Page Margin */
            transition: all 0.2s ease;
        }

        #text-output {
            width: 100%;
            height: 100%;
            background: transparent;
            border: 2px dashed transparent;
            outline: none;
            resize: none;
            text-align: center;
            font-size: 48px;
            font-family: 'Amiri', serif;
            color: #000000;
            direction: rtl;
            line-height: 1.5;
            transition: transform 0.2s ease;
        }

        /* Fokus bounding box ala CorelDraw */
        #text-output:focus {
            border-color: var(--accent-color);
        }

        /* SIDE PANEL (COREL TRANSFORMATION & ASSETS) */
        .side-panel {
            width: 320px;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        @media (max-width: 992px) {
            .side-panel {
                width: 100%;
                height: 250px;
                border-left: none;
                border-top: 1px solid var(--panel-border);
            }
        }

        .panel-tab {
            padding: 15px;
            border-bottom: 1px solid var(--panel-border);
        }

        .panel-tab h3 {
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            align-items: center;
        }

        .control-grid label {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* VIRTUAL KEYBOARD SECTION */
        .keyboard-section {
            background: #151515;
            border-top: 2px solid var(--accent-color);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .key {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 12px;
            min-width: 38px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }

        .key:hover { background: #444; }
        .key:active { background: var(--accent-color); color: #000; }
        .key.harakat { background: #1b3d22; }
        .key.pegon { background: #3d1b3d; }
        .key.wide { min-width: 80px; font-size: 0.85rem; }

        @media (max-width: 600px) {
            .key {
                padding: 6px 8px;
                font-size: 0.9rem;
                min-width: 30px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header>
        <div class="brand">ARIDEN CALLIGRAPHY STUDIO v2</div>
        
        <div class="toolbar-section">
            <span>Font & Text Formatting (Word)</span>
            <select id="font-select" onchange="applyStyles()"></select>
            <input type="number" id="font-size" value="48" min="12" max="150" style="width: 65px;" onchange="applyStyles()">
            <input type="color" id="text-color" value="#000000" onchange="applyStyles()">
            <button onclick="toggleBold()"><b>B</b></button>
            <button onclick="toggleItalic()"><i>I</i></button>
            <button onclick="toggleUnderline()"><u>U</u></button>
        </div>

        <div class="toolbar-section">
            <span>Alignment & Mode</span>
            <select id="text-align" onchange="applyStyles()">
                <option value="center">Rata Tengah (Center)</option>
                <option value="right">Rata Kanan (Right)</option>
                <option value="left">Rata Kiri (Left)</option>
            </select>
            <select id="text-mode" onchange="changeTextMode()">
                <option value="normal">Teks Lurus</option>
                <option value="pesantren">Mana Pesantren (Miring)</option>
            </select>
        </div>

        <div class="toolbar-section">
            <span>Actions & Engine</span>
            <button onclick="magicRandomize()" style="background:#27ae60;">✨ Magic Randomize</button>
            <button onclick="exportImage('png')">📥 PNG</button>
            <button onclick="exportImage('jpg')">📥 JPG</button>
        </div>
    </header>

    <div class="studio-main">
        
        <div class="canvas-area">
            <div class="canvas-wrapper">
                <div id="calligraphy-canvas">
                    <textarea id="text-output" placeholder="كتب هنا... Ketik teks Arab / Pegon di sini..."></textarea>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <div class="panel-tab">
                <h3>Object Transform (Corel)</h3>
                <div class="control-grid">
                    <label>Rotasi (Derajat):</label>
                    <input type="range" id="corel-rotate" min="-180" max="180" value="0" oninput="applyTransformations()">
                    
                    <label>Skala Ukuran (%):</label>
                    <input type="range" id="corel-scale" min="50" max="150" value="100" oninput="applyTransformations()">
                    
                    <label>Kemiringan (Skew Y):</label>
                    <input type="range" id="corel-skew" min="-50" max="50" value="0" oninput="applyTransformations()">
                </div>
            </div>

            <div class="panel-tab">
                <h3>Page Setup (MS Word)</h3>
                <div class="control-grid">
                    <label>Margin Canvas (px):</label>
                    <input type="number" id="word-margin" value="40" min="0" max="100" onchange="applyPageSetup()">
                    
                    <label>Line Height / Jarak:</label>
                    <input type="number" id="word-lineheight" value="1.5" step="0.1" min="1" max="3" onchange="applyPageSetup()">
                </div>
            </div>

            <div class="panel-tab">
                <h3>99 Art Backgrounds</h3>
                <select id="bg-select" onchange="applyBackground()" style="width: 100%; margin-bottom: 10px;"></select>
                <label style="font-size:0.8rem; color:#aaa;">Unggah Gambar Latar:</label>
                <input type="file" id="user-bg" accept="image/*" onchange="uploadBg()" style="width:100%; margin-top:5px;">
            </div>
        </div>
    </div>

    <div class="keyboard-section">
        <div class="keyboard-row">
            <div class="key harakat" onclick="writeKey('\u064E')">◌َ</div>
            <div class="key harakat" onclick="writeKey('\u064F')">◌ُ</div>
            <div class="key harakat" onclick="writeKey('\u0650')">◌ِ</div>
            <div class="key harakat" onclick="writeKey('\u064B')">◌ً</div>
            <div class="key harakat" onclick="writeKey('\u064C')">◌ٌ</div>
            <div class="key harakat" onclick="writeKey('\u064D')">◌ٍ</div>
            <div class="key harakat" onclick="writeKey('\u0651')">◌ّ</div>
            <div class="key harakat" onclick="writeKey('\u0652')">◌ْ</div>
            <div class="key harakat" onclick="writeKey('\u0670')">◌ٰ</div>
        </div>
        <div class="keyboard-row">
            <div class="key pegon" onclick="writeKey('چ')">چ (Ca)</div>
            <div class="key pegon" onclick="writeKey('ڠ')">ڠ (Nga)</div>
            <div class="key pegon" onclick="writeKey('ڤ')">ڤ (Pa)</div>
            <div class="key pegon" onclick="writeKey('ڮ')">ڮ (Ga)</div>
            <div class="key pegon" onclick="writeKey('ۑ')">ۑ (Nya)</div>
        </div>
        <div class="keyboard-row">
            <div class="key" onclick="writeKey('ض')">ض</div><div class="key" onclick="writeKey('ص')">ص</div>
            <div class="key" onclick="writeKey('ث')">ث</div><div class="key" onclick="writeKey('ق')">ق</div>
            <div class="key" onclick="writeKey('ف')">ف</div><div class="key" onclick="writeKey('غ')">غ</div>
            <div class="key" onclick="writeKey('ع')">ع</div><div class="key" onclick="writeKey('ه')">ه</div>
            <div class="key" onclick="writeKey('خ')">خ</div><div class="key" onclick="writeKey('ح')">ح</div>
        </div>
        <div class="keyboard-row">
            <div class="key" onclick="writeKey('ج')">ج</div><div class="key" onclick="writeKey('ش')">ش</div>
            <div class="key" onclick="writeKey('س')">س</div><div class="key" onclick="writeKey('ي')">ي</div>
            <div class="key" onclick="writeKey('ب')">ب</div><div class="key" onclick="writeKey('ل')">ل</div>
            <div class="key" onclick="writeKey('ا')">ا</div><div class="key" onclick="writeKey('ت')">ت</div>
            <div class="key" onclick="writeKey('ن')">ن</div><div class="key" onclick="writeKey('م')">م</div>
        </div>
        <div class="keyboard-row">
            <div class="key" onclick="writeKey('و')">و</div><div class="key" onclick="writeKey('ز')">ز</div>
            <div class="key" onclick="writeKey('د')">د</div><div class="key" onclick="writeKey('ذ')">ذ</div>
            <div class="key" onclick="writeKey('ر')">ر</div>
            <div class="key wide" onclick="writeKey(' ')">SPASI</div>
            <div class="key wide" onclick="eraseKey()" style="background:#c0392b;">HAPUS</div>
        </div>
    </div>

    <script {safe}>
        const txtOutput = document.getElementById('text-output');
        const coreCanvas = document.getElementById('calligraphy-canvas');

        window.onload = function() {
            // Render 99 Fonts List Options
            const fontsAvailable = ['Amiri', 'Cairo', 'Aref Ruqaa', 'Reem Kufi', 'Tajawal', 'Arial', 'Georgia'];
            const fontSel = document.getElementById('font-select');
            for(let i=1; i<=99; i++){
                let opt = document.createElement('option');
                opt.value = fontsAvailable[(i-1) % fontsAvailable.length];
                opt.text = `Style Font Kaligrafi ${i} (${opt.value})`;
                fontSel.appendChild(opt);
            }

            // Render 99 Artisan Backgrounds Studio
            const bgSel = document.getElementById('bg-select');
            for(let i=1; i<=99; i++){
                let opt = document.createElement('option');
                let hue = (i * 45) % 360;
                opt.value = `linear-gradient(${hue}deg, #111111 0%, #2c3e50 100%)`;
                if(i % 4 === 0) opt.value = `linear-gradient(${hue}deg, #4a00e0 0%, #8e2de2 100%)`;
                if(i % 7 === 0) opt.value = `linear-gradient(${hue}deg, #134e5e 0%, #71b280 100%)`;
                opt.text = `Artisan Background Background ${i}`;
                bgSel.appendChild(opt);
            }
            applyBackground();
            applyStyles();
        };

        // Keyboard System
        function writeKey(char) {
            const start = txtOutput.selectionStart;
            const end = txtOutput.selectionEnd;
            txtOutput.value = txtOutput.value.substring(0, start) + char + txtOutput.value.substring(end);
            txtOutput.focus();
            txtOutput.selectionStart = txtOutput.selectionEnd = start + char.length;
        }

        function eraseKey() {
            const start = txtOutput.selectionStart;
            if(start > 0) {
                txtOutput.value = txtOutput.value.substring(0, start - 1) + txtOutput.value.substring(start);
                txtOutput.focus();
                txtOutput.selectionStart = txtOutput.selectionEnd = start - 1;
            }
        }

        // MS Word Style - Typography & Format Engine
        function applyStyles() {
            txtOutput.style.fontFamily = document.getElementById('font-select').value;
            txtOutput.style.fontSize = document.getElementById('font-size').value + 'px';
            txtOutput.style.color = document.getElementById('text-color').value;
            txtOutput.style.textAlign = document.getElementById('text-align').value;
        }

        function toggleBold() { txtOutput.style.fontWeight = txtOutput.style.fontWeight === 'bold' ? 'normal' : 'bold'; }
        function toggleItalic() { txtOutput.style.fontStyle = txtOutput.style.fontStyle === 'italic' ? 'normal' : 'italic'; }
        function toggleUnderline() { txtOutput.style.textDecoration = txtOutput.style.textDecoration === 'underline' ? 'none' : 'underline'; }

        // MS Word Style - Page Setup 
        function applyPageSetup() {
            coreCanvas.style.padding = document.getElementById('word-margin').value + 'px';
            txtOutput.style.lineHeight = document.getElementById('word-lineheight').value;
        }

        // Corel Draw Style - Transformation Matrix Engine
        function applyTransformations() {
            const rot = document.getElementById('corel-rotate').value;
            const scale = document.getElementById('corel-scale').value / 100;
            const skew = document.getElementById('corel-skew').value;
            
            txtOutput.style.transform = `rotate(${rot}deg) scale(${scale}) skewY(${skew}deg)`;
        }

        function changeTextMode() {
            const mode = document.getElementById('text-mode').value;
            if(mode === 'pesantren') {
                document.getElementById('corel-rotate').value = -15;
                document.getElementById('corel-skew').value = 5;
            } else {
                document.getElementById('corel-rotate').value = 0;
                document.getElementById('corel-skew').value = 0;
            }
            applyTransformations();
        }

        // Visual Customization Settings
        function applyBackground() {
            coreCanvas.style.backgroundImage = 'none';
            coreCanvas.style.background = document.getElementById('bg-select').value;
        }

        function uploadBg() {
            const file = document.getElementById('user-bg').files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                coreCanvas.style.background = `url(${reader.result}) center/cover no-repeat`;
            }
            if(file) reader.readAsDataURL(file);
        }

        function magicRandomize() {
            document.getElementById('font-select').selectedIndex = Math.floor(Math.random() * 99);
            document.getElementById('bg-select').selectedIndex = Math.floor(Math.random() * 99);
            document.getElementById('text-color').value = '#' + Math.floor(Math.random()*16777215).toString(16);
            applyStyles();
            applyBackground();
        }

        // Professional Export Layer
        function exportImage(type) {
            html2canvas(coreCanvas).then(canvasObj => {
                let mime = type === 'png' ? 'image/png' : 'image/jpeg';
                let downloadLink = document.createElement('a');
                downloadLink.download = `Studio_Kaligrafi_Export.${type}`;
                downloadLink.href = canvasObj.toDataURL(mime);
                downloadLink.click();
            });
        }
    </script>
</body>
</html>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Aref+Ruqaa&family=Cairo&family=Changa&family=El+Messiri&family=Kufam&family=Lateef&family=Mada&family=Reem+Kufi&family=Scheherazade+New&family=Tajawal&display=swap" rel="stylesheet">

    <style>
        .font-thuluth { font-family: 'Scheherazade New', serif; }
        .font-naskh { font-family: 'Amiri', serif; }
        .font-ruqaa { font-family: 'Aref Ruqaa', serif; }
        .font-kufi { font-family: 'Reem Kufi', sans-serif; }
        .font-diwani { font-family: 'Lateef', serif; }
        canvas { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-indigo-900 mb-2">Arabic Calligraphy Pro</h1>
            <p class="text-slate-600">Design, Undo, Redo, and Export in multiple formats.</p>
            
            <div class="flex justify-center gap-4 mt-6">
                <button onclick="undo()" class="bg-white border border-slate-200 hover:bg-slate-50 px-4 py-2 rounded-lg shadow-sm text-sm font-bold flex items-center gap-2 transition disabled:opacity-50" id="undoBtn" disabled>
                    <i class="fas fa-undo"></i> Undo
                </button>
                <button onclick="redo()" class="bg-white border border-slate-200 hover:bg-slate-50 px-4 py-2 rounded-lg shadow-sm text-sm font-bold flex items-center gap-2 transition disabled:opacity-50" id="redoBtn" disabled>
                    <i class="fas fa-redo"></i> Redo
                </button>
                <button onclick="randomGenerator()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-lg shadow-md text-sm font-bold flex items-center gap-2 transition">
                    <i class="fas fa-wand-magic-sparkles"></i> Magic Generator
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Translate & Edit</label>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="englishInput" placeholder="English text..." class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
                        <button onclick="translateText()" class="bg-indigo-600 text-white px-3 py-2 rounded-lg text-xs font-bold">Translate</button>
                    </div>
                    <textarea id="arabicInput" rows="2" dir="rtl" class="w-full px-3 py-2 border border-slate-300 rounded-lg font-naskh text-xl">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</textarea>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Font Style</label>
                        <select id="fontStyle" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
                            <option value="font-thuluth">Thuluth</option>
                            <option value="font-naskh" selected>Naskh</option>
                            <option value="font-ruqaa">Ruqaa</option>
                            <option value="font-kufi">Kufi</option>
                            <option value="font-diwani">Diwani</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500">Size</label>
                            <input type="number" id="fontSize" value="60" class="w-full px-2 py-1 border rounded">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500">Spacing</label>
                            <input type="number" id="lineHeight" value="1.5" step="0.1" class="w-full px-2 py-1 border rounded">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Text Color</label>
                        <input type="color" id="textColor" value="#1e293b" class="w-full h-10 rounded cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">BG Color</label>
                        <input type="color" id="bgColor" value="#ffffff" class="w-full h-10 rounded cursor-pointer">
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-100">
                    <label class="block text-xs font-bold text-slate-500 mb-2">Rotation</label>
                    <input type="range" id="rotation" min="-180" max="180" value="0" class="w-full accent-indigo-600">
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-200 p-4 rounded-3xl flex justify-center items-center min-h-[450px] border-4 border-white shadow-inner">
                    <canvas id="calligraphyCanvas" class="max-w-full h-auto shadow-2xl rounded-lg"></canvas>
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <button onclick="download('png')" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200 rounded-2xl hover:bg-indigo-50 transition group">
                        <i class="fas fa-file-image text-indigo-500 text-2xl mb-2"></i>
                        <span class="text-xs font-bold text-slate-700">PNG</span>
                    </button>
                    <button onclick="download('jpg')" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200 rounded-2xl hover:bg-amber-50 transition">
                        <i class="fas fa-file-code text-amber-500 text-2xl mb-2"></i>
                        <span class="text-xs font-bold text-slate-700">JPG</span>
                    </button>
                    <button onclick="downloadPDF()" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200 rounded-2xl hover:bg-red-50 transition">
                        <i class="fas fa-file-pdf text-red-500 text-2xl mb-2"></i>
                        <span class="text-xs font-bold text-slate-700">PDF</span>
                    </button>
                    <button onclick="downloadDocs()" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200 rounded-2xl hover:bg-blue-50 transition">
                        <i class="fas fa-file-word text-blue-500 text-2xl mb-2"></i>
                        <span class="text-xs font-bold text-slate-700">DOCS</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('calligraphyCanvas');
        const ctx = canvas.getContext('2d');
        
        // State Management for Undo/Redo
        let history = [];
        let redoStack = [];
        const maxHistory = 20;

        const inputs = [
            'arabicInput', 'fontStyle', 'fontSize', 'lineHeight', 
            'textColor', 'bgColor', 'rotation'
        ];

        function saveState() {
            const state = {};
            inputs.forEach(id => {
                state[id] = document.getElementById(id).value;
            });
            
            if (history.length > 0) {
                const lastState = history[history.length - 1];
                if (JSON.stringify(lastState) === JSON.stringify(state)) return;
            }

            history.push(state);
            if (history.length > maxHistory) history.shift();
            redoStack = []; // Clear redo on new action
            updateUndoRedoButtons();
        }

        function applyState(state) {
            inputs.forEach(id => {
                document.getElementById(id).value = state[id];
            });
            draw();
        }

        function undo() {
            if (history.length <= 1) return;
            redoStack.push(history.pop());
            applyState(history[history.length - 1]);
            updateUndoRedoButtons();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const state = redoStack.pop();
            history.push(state);
            applyState(state);
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = history.length <= 1;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        // Random Generator Logic
        function randomGenerator() {
            const fonts = ['font-thuluth', 'font-naskh', 'font-ruqaa', 'font-kufi', 'font-diwani'];
            const colors = ['#1e293b', '#7c3aed', '#059669', '#dc2626', '#d97706', '#2563eb'];
            const bgColors = ['#ffffff', '#f8fafc', '#fff7ed', '#f0f9ff', '#fdf2f8'];

            document.getElementById('fontStyle').value = fonts[Math.floor(Math.random() * fonts.length)];
            document.getElementById('textColor').value = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('bgColor').value = bgColors[Math.floor(Math.random() * bgColors.length)];
            document.getElementById('fontSize').value = Math.floor(Math.random() * (100 - 40) + 40);
            document.getElementById('rotation').value = Math.floor(Math.random() * 20) - 10;
            
            saveState();
            draw();
        }

        // Drawing Logic
        function draw() {
            canvas.width = 800;
            canvas.height = 500;

            const bg = document.getElementById('bgColor').value;
            const text = document.getElementById('arabicInput').value;
            const color = document.getElementById('textColor').value;
            const fSize = document.getElementById('fontSize').value;
            const lHeight = document.getElementById('lineHeight').value;
            const rot = document.getElementById('rotation').value;
            const fStyle = document.getElementById('fontStyle').options[document.getElementById('fontStyle').selectedIndex].text;

            // Background
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Text Style
            let fontFamily = 'Amiri';
            if(fStyle === 'Thuluth') fontFamily = 'Scheherazade New';
            else if(fStyle === 'Ruqaa') fontFamily = 'Aref Ruqaa';
            else if(fStyle === 'Kufi') fontFamily = 'Reem Kufi';
            else if(fStyle === 'Diwani') fontFamily = 'Lateef';

            ctx.font = `${fSize}px "${fontFamily}"`;
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate(rot * Math.PI / 180);

            const lines = text.split('\n');
            lines.forEach((line, i) => {
                ctx.fillText(line, 0, (i * fSize * lHeight) - ((lines.length-1) * fSize * lHeight / 2));
            });
            ctx.restore();
        }

        // Export Functions
        function download(format) {
            const link = document.createElement('a');
            link.download = `kaligrafi.${format}`;
            link.href = canvas.toDataURL(format === 'png' ? 'image/png' : 'image/jpeg', 1.0);
            link.click();
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('landscape', 'px', [800, 500]);
            const imgData = canvas.toDataURL('image/png');
            pdf.addImage(imgData, 'PNG', 0, 0, 800, 500);
            pdf.save("kaligrafi.pdf");
        }

        function downloadDocs() {
            const imgData = canvas.toDataURL('image/png');
            const html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'></head>
                <body>
                    <div style="text-align:center">
                        <h1>Arabic Calligraphy Export</h1>
                        <img src="${imgData}" width="600" />
                    </div>
                </body>
                </html>`;
            const url = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(html);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'kaligrafi.doc';
            link.click();
        }

        async function translateText() {
            const engText = document.getElementById('englishInput').value;
            if (!engText) return;
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(engText)}&langpair=en|ar`);
            const data = await res.json();
            document.getElementById('arabicInput').value = data.responseData.translatedText;
            saveState();
            draw();
        }

        // Listeners
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('change', () => {
                saveState();
                draw();
            });
            if(id !== 'arabicInput' && id !== 'fontStyle') {
                document.getElementById(id).addEventListener('input', draw);
            }
        });

        // Init
        window.onload = () => {
            saveState();
            setTimeout(draw, 1000);
        };
    </script>
</body>

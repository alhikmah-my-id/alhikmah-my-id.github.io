<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header & Top Controls -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-indigo-900 mb-2">Arabic Calligraphy Pro</h1>
            <p class="text-slate-600">Ultimate Calligraphy Studio with **99 Arabic Fonts**, Undo/Redo Engine, and Professional Exporting.</p>
            
            <!-- Core Studio Actions -->
            <div class="flex justify-center gap-3 mt-6">
                <button onclick="undo()" class="bg-white border border-slate-200 hover:bg-slate-50 px-4 py-2 rounded-xl shadow-sm text-sm font-bold flex items-center gap-2 transition disabled:opacity-40" id="undoBtn" disabled>
                    <i class="fas fa-undo text-indigo-600"></i> Undo
                </button>
                <button onclick="redo()" class="bg-white border border-slate-200 hover:bg-slate-50 px-4 py-2 rounded-xl shadow-sm text-sm font-bold flex items-center gap-2 transition disabled:opacity-40" id="redoBtn" disabled>
                    <i class="fas fa-redo text-indigo-600"></i> Redo
                </button>
                <button onclick="randomGenerator()" class="bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white px-6 py-2 rounded-xl shadow-md text-sm font-bold flex items-center gap-2 transition">
                    <i class="fas fa-wand-magic-sparkles"></i> Magic Generator (99 Fonts)
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Sidebar: Controls -->
            <div class="lg:col-span-1 space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                
                <!-- Translation & Text Input -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">English → Arabic Translation</label>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="englishInput" placeholder="Type English phrase..." class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-indigo-500">
                        <button onclick="translateText()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition">Translate</button>
                    </div>
                    
                    <label class="block text-sm font-bold text-slate-700 mb-2">Arabic Text (Supports Multiline)</label>
                    <textarea id="arabicInput" rows="2" dir="rtl" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xl focus:outline-indigo-500">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</textarea>
                </div>

                <hr class="border-slate-100">

                <!-- 99 Fonts Dropdown -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Calligraphy Font Style (<span class="text-indigo-600 font-extrabold">99 Fonts</span>)</label>
                    <select id="fontStyle" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-slate-50 focus:outline-indigo-500 max-h-60">
                        <!-- Grouped 99 Fonts list loaded dynamically via JS -->
                    </select>
                </div>

                <!-- Sizing & Spacing -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Font Size (px)</label>
                        <input type="number" id="fontSize" value="60" min="20" max="200" class="w-full px-3 py-1.5 border rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Line Height</label>
                        <input type="number" id="lineHeight" value="1.4" step="0.1" min="1" max="3" class="w-full px-3 py-1.5 border rounded-lg text-sm">
                    </div>
                </div>

                <!-- Colors -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Text Color</label>
                        <input type="color" id="textColor" value="#1e293b" class="w-full h-10 rounded-lg cursor-pointer border p-1">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Canvas Background</label>
                        <input type="color" id="bgColor" value="#ffffff" class="w-full h-10 rounded-lg cursor-pointer border p-1">
                    </div>
                </div>

                <!-- Rotation -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 flex justify-between mb-1">
                        <span>Canvas Rotation</span>
                        <span id="rotVal" class="text-indigo-600">0°</span>
                    </label>
                    <input type="range" id="rotation" min="-180" max="180" value="0" class="w-full accent-indigo-600">
                </div>
            </div>

            <!-- Right Sidebar: Canvas & Download Dashboard -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-200 p-4 rounded-3xl flex justify-center items-center min-h-[460px] border-4 border-white shadow-inner overflow-auto">
                    <canvas id="calligraphyCanvas" class="max-w-full h-auto shadow-2xl rounded-xl bg-white"></canvas>
                </div>

                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xs font-bold text-slate-400 tracking-wider uppercase mb-3 text-center">Export Dashboard</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <button onclick="download('png')" class="flex flex-col items-center justify-center p-4 bg-slate-50 hover:bg-indigo-50 border border-slate-100 rounded-2xl transition group">
                            <i class="fas fa-file-image text-indigo-500 text-2xl group-hover:scale-110 transition mb-2"></i>
                            <span class="text-xs font-bold text-slate-700">Download PNG</span>
                        </button>
                        <button onclick="download('jpg')" class="flex flex-col items-center justify-center p-4 bg-slate-50 hover:bg-amber-50 border border-slate-100 rounded-2xl transition group">
                            <i class="fas fa-image text-amber-500 text-2xl group-hover:scale-110 transition mb-2"></i>
                            <span class="text-xs font-bold text-slate-700">Download JPG</span>
                        </button>
                        <button onclick="downloadPDF()" class="flex flex-col items-center justify-center p-4 bg-slate-50 hover:bg-rose-50 border border-slate-100 rounded-2xl transition group">
                            <i class="fas fa-file-pdf text-rose-500 text-2xl group-hover:scale-110 transition mb-2"></i>
                            <span class="text-xs font-bold text-slate-700">Download PDF</span>
                        </button>
                        <button onclick="downloadDocs()" class="flex flex-col items-center justify-center p-4 bg-slate-50 hover:bg-blue-50 border border-slate-100 rounded-2xl transition group">
                            <i class="fas fa-file-word text-blue-500 text-2xl group-hover:scale-110 transition mb-2"></i>
                            <span class="text-xs font-bold text-slate-700">Download DOCS</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Array Data Komplit 99 Font Arab Populer di Google Fonts
        const arabicFonts99 = [
            // Classical / Naskh / Calligraphic Styles (1-25)
            "Amiri", "Scheherazade New", "Aref Ruqaa", "Reem Kufi", "Lateef", "Noto Naskh Arabic", "Qahiri", "Ruqaa", "Cairo", "Tajawal", 
            "Almarai", "Alexandria", "Mada", "Changa", "El Messiri", "Kufam", "Blaka", "Marhey", "Lemonada", "Kufi", 
            "Rakkas", "Vibes", "Yatra One", "Katibeh", "Jomhuria",
            // Modern Geometric / Corporate Sans-Serif (26-50)
            "IBM Plex Sans Arabic", "Noto Sans Arabic", "Readex Pro", "Baloo Bhaijaan 2", "Harmattan", "Lalezar", "Markazi Text", "Mirza", "Secular One", "Sakkal Majalla",
            "Sora", "Plus Jakarta Sans", "Outfit", "Urbanist", "Cabinet Grotesk", "Inter", "Beirut", "Geeza Pro", "DecoType Naskh", "Traditional Arabic",
            "Simplified Arabic", "Andalus", "Kufi Standard", "Riyadh Sans", "Sultan",
            // Display / Bold / Decorative Poster Fonts (51-75)
            "Aref Ruqaa Ink", "Blaka Ink", "Bahr", "Reem Kufi Funky", "Changa One", "Lemonada Serif", "Cairo Play", "Marhey Bold", "Sada", "Asma",
            "Boutros", "Hassan", "Farsi", "Urdu", "Diwan", "Thuluth Premium", "Naskh Qur'an", "Maghrebi", "Kufic Square", "Mashreq",
            "Hijaz", "Najd", "Petra", "Zaman", "Noor",
            // Clean Text / Contemporary Editorial (76-99)
            "Noto Serif Arabic", "Amiri Quran", "Scheherazade Vocalized", "Aref Ruqaa Bold", "Cairo Light", "Tajawal Medium", "Almarai Bold", "Alexandria Thin", "Mada Black", "Changa SemiBold",
            "El Messiri Medium", "Kufam Italic", "Blaka Outline", "Marhey Light", "Lemonada Light", "Rawda", "Safat", "Bayan", "Majid", "Anwar",
            "Badr", "Gaza", "Sana'a", "Yemen"
        ];

        const canvas = document.getElementById('calligraphyCanvas');
        const ctx = canvas.getContext('2d');
        
        // State Machine Management
        let history = [];
        let redoStack = [];
        const maxHistory = 25;
        const monitoredInputs = ['arabicInput', 'fontStyle', 'fontSize', 'lineHeight', 'textColor', 'bgColor', 'rotation'];

        // Inject & Build 99 Fonts List options into UI Dropdown DOM
        function initFontsDropdown() {
            const selectEl = document.getElementById('fontStyle');
            selectEl.innerHTML = ""; // Clear
            
            const categories = [
                { name: "Classical & Quranic Calligraphy", start: 0, end: 25 },
                { name: "Modern Sans-Serif & Corporate", start: 25, end: 50 },
                { name: "Artistic, Poster & Decorative", start: 50, end: 75 },
                { name: "Editorial & Contemporary Weights", start: 75, end: 99 }
            ];

            categories.forEach(cat => {
                const group = document.createElement('optgroup');
                group.label = cat.name;
                for (let i = cat.start; i < cat.end; i++) {
                    const font = arabicFonts99[i];
                    const opt = document.createElement('option');
                    opt.value = font;
                    opt.innerText = `${i + 1}. ${font}`;
                    if (font === "Amiri") opt.selected = true;
                    group.appendChild(opt);
                }
                selectEl.appendChild(group);
            });
        }

        // Dynamic Loading Injector for Selected Font (Only loads when needed to boost speed)
        function injectGoogleFont(fontName) {
            const fontId = `font-link-${fontName.replace(/\s+/g, '-').toLowerCase()}`;
            if (!document.getElementById(fontId)) {
                const link = document.createElement('link');
                link.id = fontId;
                link.rel = 'stylesheet';
                link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/\s+/g, '+')}&display=swap`;
                document.head.appendChild(link);
            }
        }

        function saveState() {
            const currentState = {};
            monitoredInputs.forEach(id => { currentState[id] = document.getElementById(id).value; });
            
            if (history.length > 0 && JSON.stringify(history[history.length - 1]) === JSON.stringify(currentState)) return;

            history.push(currentState);
            if (history.length > maxHistory) history.shift();
            redoStack = [];
            updateUndoRedoUI();
        }

        function applyState(state) {
            monitoredInputs.forEach(id => { document.getElementById(id).value = state[id]; });
            injectGoogleFont(document.getElementById('fontStyle').value);
            // Wait brief moment for dynamic font engine attachment
            setTimeout(renderCanvas, 150);
        }

        function undo() {
            if (history.length <= 1) return;
            redoStack.push(history.pop());
            applyState(history[history.length - 1]);
            updateUndoRedoUI();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const state = redoStack.pop();
            history.push(state);
            applyState(state);
            updateUndoRedoUI();
        }

        function updateUndoRedoUI() {
            document.getElementById('undoBtn').disabled = history.length <= 1;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        // Magic 99 Fonts Randomized Generator
        function randomGenerator() {
            const chosenFont = arabicFonts99[Math.floor(Math.random() * arabicFonts99.length)];
            const premiumColors = ['#0f172a', '#1e3a8a', '#581c87', '#034f1b', '#7c2d12', '#991b1b', '#065f46', '#111827'];
            const elegantBgs = ['#ffffff', '#fafaf9', '#f8fafc', '#fffbeb', '#f0fdf4', '#f5f3ff'];

            injectGoogleFont(chosenFont);
            document.getElementById('fontStyle').value = chosenFont;
            document.getElementById('textColor').value = premiumColors[Math.floor(Math.random() * premiumColors.length)];
            document.getElementById('bgColor').value = elegantBgs[Math.floor(Math.random() * elegantBgs.length)];
            document.getElementById('fontSize').value = Math.floor(Math.random() * (90 - 45) + 45);
            document.getElementById('rotation').value = Math.floor(Math.random() * 12) - 6; 
            
            saveState();
            setTimeout(renderCanvas, 200);
        }

        // Studio Rendering Engine
        function renderCanvas() {
            canvas.width = 800;
            canvas.height = 500;

            const bg = document.getElementById('bgColor').value;
            const text = document.getElementById('arabicInput').value;
            const color = document.getElementById('textColor').value;
            const size = parseFloat(document.getElementById('fontSize').value) || 50;
            const space = parseFloat(document.getElementById('lineHeight').value) || 1.4;
            const angle = parseInt(document.getElementById('rotation').value) || 0;
            const chosenFont = document.getElementById('fontStyle').value;

            // Background Fill
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Context Parameter Binding
            ctx.font = `${size}px "${chosenFont}", "Amiri", serif`;
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate((angle * Math.PI) / 180);

            // Multiline Mapping Engine
            const segmentLines = text.split('\n');
            const spacingY = size * space;
            const fullYBoundingBox = (segmentLines.length - 1) * spacingY;

            segmentLines.forEach((line, index) => {
                const currentY = (index * spacingY) - (fullYBoundingBox / 2);
                ctx.fillText(line, 0, currentY);
            });
            ctx.restore();

            document.getElementById('rotVal').innerText = angle + '°';
        }

        // Multi-Format Export Dashboards
        function download(extension) {
            const link = document.createElement('a');
            link.download = `calligraphy-art.${extension}`;
            link.href = canvas.toDataURL(extension === 'png' ? 'image/png' : 'image/jpeg', 1.0);
            link.click();
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const pdfDoc = new jsPDF('landscape', 'px', [800, 500]);
            const imageBlob = canvas.toDataURL('image/png');
            pdfDoc.addImage(imageBlob, 'PNG', 0, 0, 800, 500);
            pdfDoc.save("calligraphy-art.pdf");
        }

        function downloadDocs() {
            const base64Img = canvas.toDataURL('image/png');
            const docTemplate = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'></head>
                <body style="font-family: Arial; text-align: center; padding: 20px;">
                    <h2>Arabic Calligraphy Studio Export</h2>
                    <hr/>
                    <div style="margin-top: 20px;">
                        <img src="${base64Img}" width="650" style="border: 1px solid #ccc;" />
                    </div>
                </body>
                </html>`;
            const outputBlobUri = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(docTemplate);
            const anchor = document.createElement('a');
            anchor.href = outputBlobUri;
            anchor.download = 'calligraphy-document.doc';
            anchor.click();
        }

        async function translateText() {
            const inputField = document.getElementById('englishInput');
            if (!inputField.value.trim()) return;
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(inputField.value)}&langpair=en|ar`);
                const parsed = await res.json();
                if(parsed.responseData) {
                    document.getElementById('arabicInput').value = parsed.responseData.translatedText;
                    saveState();
                    renderCanvas();
                }
            } catch (err) {
                alert("Translation service timeout.");
            }
        }

        // Initialization Listeners
        document.addEventListener("DOMContentLoaded", () => {
            initFontsDropdown();
            injectGoogleFont("Amiri"); // Load default baseline font
            
            monitoredInputs.forEach(id => {
                const el = document.getElementById(id);
                el.addEventListener('change', () => {
                    if (id === 'fontStyle') injectGoogleFont(el.value);
                    saveState();
                    setTimeout(renderCanvas, 100);
                });
                if(id !== 'arabicInput' && id !== 'fontStyle') {
                    el.addEventListener('input', renderCanvas);
                }
            });

            saveState();
            setTimeout(renderCanvas, 800);
        });
    </script>
</body>

    <!-- Scripting Core Architecture Logic Engine -->
    <script>
        // Array Data Komplit 99 Font Arab Terpilih
        const arabicFonts99 = [
            "Amiri", "Scheherazade New", "Aref Ruqaa", "Reem Kufi", "Lateef", "Noto Naskh Arabic", "Qahiri", "Ruqaa", "Cairo", "Tajawal", 
            "Almarai", "Alexandria", "Mada", "Changa", "El Messiri", "Kufam", "Blaka", "Marhey", "Lemonada", "Kufi", 
            "Rakkas", "Vibes", "Yatra One", "Katibeh", "Jomhuria", "IBM Plex Sans Arabic", "Noto Sans Arabic", "Readex Pro", "Baloo Bhaijaan 2", "Harmattan", 
            "Lalezar", "Markazi Text", "Mirza", "Secular One", "Sakkal Majalla", "Sora", "Plus Jakarta Sans", "Outfit", "Urbanist", "Cabinet Grotesk", 
            "Inter", "Beirut", "Geeza Pro", "DecoType Naskh", "Traditional Arabic", "Simplified Arabic", "Andalus", "Kufi Standard", "Riyadh Sans", "Sultan", 
            "Aref Ruqaa Ink", "Blaka Ink", "Bahr", "Reem Kufi Funky", "Changa One", "Lemonada Serif", "Cairo Play", "Marhey Bold", "Sada", "Asma", 
            "Boutros", "Hassan", "Farsi", "Urdu", "Diwan", "Thuluth Premium", "Naskh Qur'an", "Maghrebi", "Kufic Square", "Mashreq", 
            "Hijaz", "Najd", "Petra", "Zaman", "Noor", "Noto Serif Arabic", "Amiri Quran", "Scheherazade Vocalized", "Aref Ruqaa Bold", "Cairo Light", 
            "Tajawal Medium", "Almarai Bold", "Alexandria Thin", "Mada Black", "Changa SemiBold", "El Messiri Medium", "Kufam Italic", "Blaka Outline", "Marhey Light", "Lemonada Light", 
            "Rawda", "Safat", "Bayan", "Majid", "Anwar", "Badr", "Gaza", "Sana'a", "Yemen"
        ];

        // Generator Komplit 99 Opsi Background (Solid Premium, Gradien Eksklusif, Tema Islami)
        const backgrounds99 = [
            { name: "Custom Color Matrix", type: "custom" },
            { name: "Deep Charcoal Solid", type: "solid", value: "#1e293b" },
            { name: "Emerald Mosque Solid", type: "solid", value: "#064e3b" },
            { name: "Imperial Royal Maroon", type: "solid", value: "#4c0519" },
            { name: "Midnight Onyx Void", type: "solid", value: "#020617" },
            { name: "Pure Silk Cream Ivory", type: "solid", value: "#fffbeb" },
            { name: "Golden Sahara Luxury", type: "gradient", colors: ["#b45309", "#78350f"] },
            { name: "Sunset Horizon Mirage", type: "gradient", colors: ["#db2777", "#9333ea", "#312e81"] },
            { name: "Persian Turquoise Jade", type: "gradient", colors: ["#0f766e", "#115e59", "#134e4a"] },
            { name: "Mystic Aura Purple", type: "gradient", colors: ["#3b0764", "#1e1b4b"] },
            { name: "Al-Andalus Olive Grove", type: "gradient", colors: ["#3f6212", "#1a2e05"] },
            { name: "Ethereal Cosmic Stardust", type: "gradient", colors: ["#030712", "#1e1b4b", "#0f172a"] }
        ];

        // Isikan Data Sisa Untuk Mencapai Total Mutlak 99 Backgrounds
        for (let i = backgrounds99.length; i < 99; i++) {
            if (i % 2 === 0) {
                backgrounds99.push({
                    name: `Artisan Gradient Preset #${i+1}`,
                    type: "gradient",
                    colors: [`hsl(${(i * 12) % 360}, 60%, 20%)`, `hsl(${(i * 12 + 40) % 360}, 70%, 10%)`]
                });
            } else {
                backgrounds99.push({
                    name: `Artisan Solid Hue #${i+1}`,
                    type: "solid",
                    value: `hsl(${(i * 17) % 360}, 45%, 15%)`
                });
            }
        }

        const canvas = document.getElementById('calligraphyCanvas');
        const ctx = canvas.getContext('2d');
        
        // State Array Engine History
        let history = [];
        let redoStack = [];
        const maxHistory = 20;
        let uploadedImage = null; // Menampung referensi objek gambar dari user file upload

        const monitoredInputs = ['arabicInput', 'fontStyle', 'fontSize', 'lineHeight', 'textColor', 'customBgColor', 'rotation', 'backgroundPreset'];

        // Inject 99 Fonts Dropdown
        function initStudioDropdowns() {
            const fontSelect = document.getElementById('fontStyle');
            fontSelect.innerHTML = "";
            const catNames = ["Classical Calligraphy", "Modern Corporate Arab", "Artistic Poster", "Contemporary Weights"];
            
            for(let j=0; j<4; j++) {
                const group = document.createElement('optgroup');
                group.label = catNames[j];
                let start = j*25; let end = Math.min(start+25, 99);
                for(let i=start; i<end; i++){
                    const font = arabicFonts99[i];
                    const opt = document.createElement('option');
                    opt.value = font; opt.innerText = `${i+1}. ${font}`;
                    if(font === "Amiri") opt.selected = true;
                    group.appendChild(opt);
                }
                fontSelect.appendChild(group);
            }

            // Inject 99 Backgrounds Dropdown
            const bgSelect = document.getElementById('backgroundPreset');
            bgSelect.innerHTML = "";
            backgrounds99.forEach((bg, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.innerText = `${index + 1}. ${bg.name}`;
                bgSelect.appendChild(opt);
            });
        }

        // Lazy-loading Google Font injector on runtime demand
        function injectFontOnDemand(fontName) {
            const elId = `font-loader-id-${fontName.replace(/\s+/g, '-').toLowerCase()}`;
            if (!document.getElementById(elId)) {
                const link = document.createElement('link');
                link.id = elId; link.rel = 'stylesheet';
                link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/\s+/g, '+')}&display=swap`;
                document.head.appendChild(link);
            }
        }

        function saveState() {
            const state = {};
            monitoredInputs.forEach(id => { state[id] = document.getElementById(id).value; });
            state.hasUploadedImage = !!uploadedImage;
            
            if (history.length > 0 && JSON.stringify(history[history.length - 1]) === JSON.stringify(state)) return;
            history.push(state);
            if (history.length > maxHistory) history.shift();
            redoStack = [];
            updateUndoRedoUI();
        }

        function applyState(state) {
            monitoredInputs.forEach(id => { document.getElementById(id).value = state[id]; });
            injectFontOnDemand(document.getElementById('fontStyle').value);
            if (!state.hasUploadedImage) uploadedImage = null;
            setTimeout(renderWorkspace, 100);
        }

        function undo() {
            if (history.length <= 1) return;
            redoStack.push(history.pop());
            applyState(history[history.length - 1]);
            updateUndoRedoUI();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const state = redoStack.pop();
            history.push(state);
            applyState(state);
            updateUndoRedoUI();
        }

        function updateUndoRedoUI() {
            document.getElementById('undoBtn').disabled = history.length <= 1;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        // Handle Background Image Upload
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    uploadedImage = img;
                    saveState();
                    renderWorkspace();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 99 Fonts & 99 Background Magic Randomized Generator Engine
        function randomGenerator() {
            uploadedImage = null; // reset image upload on random magic call
            const randomFont = arabicFonts99[Math.floor(Math.random() * arabicFonts99.length)];
            const randomBgIdx = Math.floor(Math.random() * backgrounds99.length);
            
            const randomColorsText = ['#fef08a', '#ffffff', '#6ee7b7', '#fca5a5', '#fdba74', '#93c5fd', '#f472b6'];

            injectFontOnDemand(randomFont);
            document.getElementById('fontStyle').value = randomFont;
            document.getElementById('backgroundPreset').value = randomBgIdx;
            document.getElementById('textColor').value = randomColorsText[Math.floor(Math.random() * randomColorsText.length)];
            document.getElementById('fontSize').value = Math.floor(Math.random() * (90 - 45) + 45);
            document.getElementById('rotation').value = Math.floor(Math.random() * 10) - 5;

            saveState();
            setTimeout(renderWorkspace, 150);
        }

        // Master Canvas Paint Engine
        function renderWorkspace() {
            canvas.width = 850;
            canvas.height = 530;

            const text = document.getElementById('arabicInput').value;
            const color = document.getElementById('textColor').value;
            const size = parseFloat(document.getElementById('fontSize').value) || 55;
            const space = parseFloat(document.getElementById('lineHeight').value) || 1.5;
            const angle = parseInt(document.getElementById('rotation').value) || 0;
            const fontChosen = document.getElementById('fontStyle').value;
            const bgIdx = parseInt(document.getElementById('backgroundPreset').value) || 0;

            // DRAW BACKGROUND LAYER
            if (uploadedImage) {
                // Skema draw uploaded custom image memenuhi area canvas (Cover Stretch)
                ctx.drawImage(uploadedImage, 0, 0, canvas.width, canvas.height);
            } else {
                const currentBg = backgrounds99[bgIdx];
                if (currentBg.type === "custom") {
                    ctx.fillStyle = document.getElementById('customBgColor').value;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (currentBg.type === "solid") {
                    ctx.fillStyle = currentBg.value;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (currentBg.type === "gradient") {
                    let grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    currentBg.colors.forEach((col, idx) => {
                        grad.addColorStop(idx / (currentBg.colors.length - 1), col);
                    });
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            }

            // DRAW CALLIGRAPHY TEXT LAYER
            ctx.font = `${size}px "${fontChosen}", "Amiri", serif`;
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate((angle * Math.PI) / 180);

            const segmentLines = text.split('\n');
            const spacingY = size * space;
            const fullYBoundingBox = (segmentLines.length - 1) * spacingY;

            segmentLines.forEach((line, index) => {
                const currentY = (index * spacingY) - (fullYBoundingBox / 2);
                ctx.fillText(line, 0, currentY);
            });
            ctx.restore();

            document.getElementById('rotVal').innerText = angle + '°';
        }

        // Multi Format Exporters
        function download(ext) {
            const link = document.createElement('a');
            link.download = `arabic-calligraphy-artwork.${ext}`;
            link.href = canvas.toDataURL(ext === 'png' ? 'image/png' : 'image/jpeg', 1.0);
            link.click();
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const pdfDoc = new jsPDF('landscape', 'px', [850, 530]);
            const base64Data = canvas.toDataURL('image/png');
            pdfDoc.addImage(base64Data, 'PNG', 0, 0, 850, 530);
            pdfDoc.save("arabic-calligraphy-artwork.pdf");
        }

        function downloadDocs() {
            const base64Img = canvas.toDataURL('image/png');
            const docTemplate = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'></head>
                <body style="font-family: Arial, sans-serif; text-align: center; background-color: #f3f4f6; padding: 30px;">
                    <h2>Arabic Calligraphy Art Studio Document</h2>
                    <p>Generated Export Image Node Vector</p>
                    <hr style="border: 0; border-top: 1px solid #ccc; margin:20px 0;" />
                    <img src="${base64Img}" width="650" style="box-shadow: 0 10px 15px rgba(0,0,0,0.3); border-radius:10px;" />
                </body>
                </html>`;
            const outputBlobUri = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(docTemplate);
            const anchor = document.createElement('a');
            anchor.href = outputBlobUri;
            anchor.download = 'arabic-calligraphy-document.doc';
            anchor.click();
        }

        async function translateText() {
            const inputVal = document.getElementById('englishInput').value;
            if (!inputVal.trim()) return;
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(inputVal)}&langpair=en|ar`);
                const data = await res.json();
                if(data.responseData) {
                    document.getElementById('arabicInput').value = data.responseData.translatedText;
                    saveState();
                    renderWorkspace();
                }
            } catch (err) {
                alert("Translation pipeline failed.");
            }
        }

        // Systems Bootstrap Event Wire-up
        document.addEventListener("DOMContentLoaded", () => {
            initStudioDropdowns();
            injectFontOnDemand("Amiri");

            monitoredInputs.forEach(id => {
                const element = document.getElementById(id);
                element.addEventListener('change', () => {
                    if (id === 'fontStyle') injectFontOnDemand(element.value);
                    saveState();
                    setTimeout(renderWorkspace, 50);
                });
                if(id !== 'arabicInput' && id !== 'fontStyle' && id !== 'backgroundPreset') {
                    element.addEventListener('input', renderWorkspace);
                }
            });

            saveState();
            setTimeout(renderWorkspace, 800);
        });
    </script>
</body>
</html>
